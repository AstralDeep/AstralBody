<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AstralDeep</title>
  <link rel="icon" type="image/png" href="/static/img/astra-fav.png">
  <link rel="apple-touch-icon" href="/static/img/astra-fav.png">
  <link rel="stylesheet" href="/static/astral.css?v=%%ASTRAL_ASSET_VER%%">
  <script>window.__ASTRAL_TOKEN__ = "%%ASTRAL_TOKEN%%"; window.__ASTRAL_RESUMED__ = %%ASTRAL_RESUMED%%;</script>
  <script src="/static/vendor/tailwind.js"></script>
  <script>
    // Map Tailwind `astral-*` color tokens to the runtime CSS variables so
    // every utility (bg-astral-primary, text-astral-muted, astral-primary/20, …)
    // resolves and theme_apply/color_picker can keep mutating them live.
    tailwind.config = {
      theme: { extend: {
        colors: {
          'astral-bg': 'rgb(var(--astral-bg) / <alpha-value>)',
          'astral-surface': 'rgb(var(--astral-surface) / <alpha-value>)',
          'astral-primary': 'rgb(var(--astral-primary) / <alpha-value>)',
          'astral-secondary': 'rgb(var(--astral-secondary) / <alpha-value>)',
          'astral-text': 'rgb(var(--astral-text) / <alpha-value>)',
          'astral-muted': 'rgb(var(--astral-muted) / <alpha-value>)',
          'astral-accent': 'rgb(var(--astral-accent) / <alpha-value>)',
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
      } },
    };
  </script>
  <script src="/static/vendor/plotly.min.js"></script>
</head>
<body class="bg-astral-bg text-astral-text">
  <div class="flex flex-col h-screen">
    <!-- Server-rendered top bar + static settings menu (role-gated at GET /
         time; see webrender/chrome/topbar.py). Glass/border styling lives in
         astral.css (#astral-topbar). -->
    <header id="astral-topbar" class="flex items-center">%%ASTRAL_TOPBAR%%</header>
    <main class="flex flex-1 min-h-0">
      <!-- Canvas: server-rendered UI (astralprims primitives). The initial
           welcome examples arrive over the normal ui_render path right after
           register_ui (orchestrator/welcome.py) — never as shell HTML. -->
      <section id="astral-canvas" data-tour-target="canvas.workspace" class="astral-canvas-panel flex-1 overflow-y-auto p-4 space-y-3"></section>
      <!-- Chat panel: raised glass rail (astral.css owns surface/border) -->
      <aside class="astral-chat-panel w-[380px] max-w-[40%] flex flex-col min-h-0">
        <!-- Server-driven chat-history surface (skeleton → list), ROTE-adapted -->
        <div id="astral-history" class="astral-history-region shrink-0 overflow-y-auto max-h-44 border-b border-white/10 px-3 py-2 space-y-1"></div>
        <div id="astral-chat" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
        <form id="astral-form" class="astral-chat-form p-3 flex flex-col gap-2">
          <!-- Attachment chips for files staged on the next turn -->
          <div id="astral-attachments" class="astral-attachments hidden flex flex-wrap gap-1.5"></div>
          <!-- Feature 068 (US5): slash-command typeahead (shown while typing a
               leading "/"). Discovery only — the server expands the command
               into a normal prompt through the usual permission/audit gates. -->
          <div id="astral-slash-menu" class="astral-slash-menu hidden" role="listbox" aria-label="Slash commands"></div>
          <div class="flex gap-2 items-center">
            <!-- Attachment (paperclip) control. The hidden input carries class
                 astral-file-upload so the client.js change-listener handles
                 selection; accept list is injected server-side from the
                 content_type allow-list (single source). -->
            <button type="button" id="astral-attach-btn" class="astral-attach-btn shrink-0" title="Attach files" aria-label="Attach files" data-tour-target="chat.attach">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            </button>
            <input id="astral-attach-input" type="file" multiple class="astral-file-upload hidden" accept="%%ASTRAL_ACCEPT%%" aria-hidden="true" tabindex="-1">
            <input id="astral-input" type="text" autocomplete="off" placeholder="Message an agent…" data-tour-target="chat.input"
                   class="astral-field flex-1 rounded-lg bg-white/5 border border-white/10 px-3 py-2 text-sm text-astral-text">
            <button type="submit" class="astral-btn astral-btn-primary px-4 py-2 rounded-lg text-sm font-medium bg-astral-primary text-white">Send</button>
          </div>
        </form>
      </aside>
    </main>
  </div>
  <!-- Chrome modal root (settings surfaces render here via chrome_render) -->
  <div id="astral-modal"></div>
  <script src="/static/client.js?v=%%ASTRAL_ASSET_VER%%"></script>
</body>
</html>
