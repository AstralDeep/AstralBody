# Feature 051 — OPTIONAL XcodeGen convenience (research D5).
# The canonical setup is the manual Xcode steps in README.md; this file just
# automates them on a dev machine: `brew install xcodegen && xcodegen`.
# XcodeGen is never required by CI or runtime (Constitution V posture).
name: AstralBody
options:
  bundleIdPrefix: com.kyopenscience.astral
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    watchOS: "10.0"
packages:
  AstralCore:
    path: AstralCore
targets:
  AstralApp:
    type: application
    supportedDestinations: [iOS, macOS]
    sources: [AstralApp]
    dependencies:
      - package: AstralCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kyopenscience.astral.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: AstralBody
        # Custom-scheme PKCE redirect (astral://oauth2redirect)
        INFOPLIST_KEY_CFBundleURLTypes: >-
          <array><dict><key>CFBundleURLSchemes</key><array><string>astral</string></array></dict></array>
        INFOPLIST_KEY_NSAppTransportSecurity: >-
          <dict><key>NSAllowsLocalNetworking</key><true/></dict>
  AstralWatch:
    type: application
    platform: watchOS
    sources: [AstralWatch]
    dependencies:
      - package: AstralCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kyopenscience.astral.watch
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: AstralBody
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_NSAppTransportSecurity: >-
          <dict><key>NSAllowsLocalNetworking</key><true/></dict>
