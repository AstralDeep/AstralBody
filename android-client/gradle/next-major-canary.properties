# Spec 060 Android next-major canary declaration.
#
# AGP 10 is currently scheduled for late 2026 and Gradle's current release is
# 9.6.1 (checked 2026-07-16). No public major-10 artifact exists for either
# tool, so an exact version or checksum here would be fabricated. The covered
# runner fails closed by default and the CI diagnostic re-checks both official
# metadata feeds before accepting this explicit UNRELEASED state. Replace all
# UNRELEASED values together once exact official artifacts exist.
schema_version=1
availability=unreleased
availability_checked_on=2026-07-16
agp_major=10
agp_version=UNRELEASED
gradle_major=10
gradle_version=UNRELEASED
gradle_distribution_url=UNRELEASED
gradle_distribution_sha256=UNRELEASED
agp_metadata_url=https://dl.google.com/dl/android/maven2/com/android/tools/build/gradle/maven-metadata.xml
gradle_versions_url=https://services.gradle.org/versions/all
roadmap_url=https://developer.android.com/build/releases/gradle-plugin-roadmap
tasks=help,ktlintCheck,:app:lintDebug,:core:test,:app:testDebugUnitTest,:app:assembleDebug
