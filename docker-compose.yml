services:
  postgres:
    image: postgres:17-alpine
    container_name: astralbody-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  astralbody:
    build:
      context: .
      dockerfile: Dockerfile
    image: astralbody:latest
    container_name: astralbody
    ports:
      - "127.0.0.1:8001:8001"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      HOST_PROC: /host/proc
      HOST_SYS: /host/sys
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/tmp:/app/backend/tmp
      - ./backend/knowledge:/app/backend/knowledge
      - ./backend/agents:/app/backend/agents
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/hostfs:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; r = urllib.request.urlopen('http://localhost:8001/readyz', timeout=5); exit(0 if r.status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped

volumes:
  pgdata:
