  astralbody:
    build:
      context: .
      dockerfile: Dockerfile
    image: astralbody:latest
    container_name: astralbody
    ports:
      - "127.0.0.1:8001:8001"
      - "127.0.0.1:5173:5173"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      # KNOWLEDGE_LLM_BASE_URL: http://ollama:11434/v1
      # KNOWLEDGE_LLM_API_KEY: ollama
      HOST_PROC: /host/proc
      HOST_SYS: /host/sys
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/tmp:/app/backend/tmp
      - ./backend/knowledge:/app/backend/knowledge
      # Mount host procfs/sysfs/rootfs so psutil reports real host metrics
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/hostfs:ro
    depends_on:
      postgres:
        condition: service_healthy
      # ollama:
      #   condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
