services:
  postgres:
    image: postgres:17-alpine
    container_name: astralbody-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  astralbody:
    build:
      context: .
      dockerfile: Dockerfile
    image: astralbody:latest
    container_name: astralbody
    ports:
      - "127.0.0.1:8001:8001"
      - "5173:5173"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/tmp:/app/backend/tmp
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
