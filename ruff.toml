# The deployment runtime is Python 3.11 (Dockerfile base image). Pinning
# ruff's target rejects 3.12+-only syntax — e.g. backslash escapes inside
# f-string expressions (PEP 701) — that newer local interpreters accept but
# the container cannot import.
target-version = "py311"

# apple-clients is a Swift package. Its .py files are build tooling, not product
# code: a container-run fixture generator (needs the installed astralprims wheel)
# and, since feature 053, Scripts/generate_app_icons.py + render_export_options.py,
# which run on the macOS release runner rather than in the backend image.
exclude = [".venv", "node_modules", "backend/tmp", "backend/data", "apple-clients"]
