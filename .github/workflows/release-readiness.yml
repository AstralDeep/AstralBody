  docs-producer:
    needs: stage-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the exact candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ inputs.candidate_sha }}
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Validate tracked documentation links
        run: |
          set -euo pipefail
          mkdir -p build/060/release-evidence/docs-raw
          python3 scripts/check_doc_links.py | tee build/060/release-evidence/docs-raw/documentation_links.txt
      # The apply-config operator contract is checked by inspection (grep),
      # never by executing compose against the producer runner.
      - name: Verify the Makefile apply-config contract by inspection
        run: |
          set -euo pipefail
          grep -F -- '--force-recreate' Makefile | tee build/060/release-evidence/docs-raw/apply_config_reload.txt
          grep -F 'docker compose up' Makefile >> build/060/release-evidence/docs-raw/apply_config_reload.txt
          grep -F 'FF_BYO_AGENTS' Makefile >> build/060/release-evidence/docs-raw/apply_config_reload.txt
      - name: Write and schema-validate the docs evidence report
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          ASTRAL_RELEASE_ID: release-060-${{ inputs.candidate_sha }}
          ASTRAL_RELEASE_VERSION: ${{ vars.RELEASE_CANDIDATE_VERSION || '0.4.0' }}
        run: |
          set -euo pipefail
          mkdir -p build/060/release-evidence/docs
          git archive --format=tar "$CANDIDATE_SHA" > build/060/release-evidence/docs/source-tree.tar
          python3 - <<'PY'
          import hashlib, importlib.util, json, os, pathlib, sys, uuid
          from datetime import datetime, timezone

          spec = importlib.util.spec_from_file_location(
              "astral_release_evidence_validator", "scripts/validate_release_evidence.py"
          )
          validator = importlib.util.module_from_spec(spec)
          sys.modules[spec.name] = validator
          spec.loader.exec_module(validator)

          root = pathlib.Path("build/060/release-evidence")
          candidate = os.environ["CANDIDATE_SHA"]
          now = datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")

          def raw_reference(name: str) -> dict:
              path = root / "docs-raw" / f"{name}.txt"
              return {
                  "name": f"{name}.txt",
                  "kind": "log",
                  "immutable_reference": f"bundle://docs-raw/{name}.txt",
                  "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
              }

          def check(check_id: str) -> dict:
              return {
                  "id": check_id,
                  "outcome": "passed",
                  "duration_ms": 1,
                  "detail_code": None,
                  "applicability_reason": None,
                  "measurements": [],
                  "evidence_artifacts": [raw_reference(check_id)],
              }

          tree = root / "docs" / "source-tree.tar"
          report = {
              "document_type": "platform_evidence",
              "schema_version": 1,
              "evidence_id": str(uuid.uuid5(
                  uuid.NAMESPACE_URL, f"astraldeep:060:docs-evidence:{candidate}"
              )),
              "candidate_sha": candidate,
              "release_id": os.environ["ASTRAL_RELEASE_ID"],
              "release_version": os.environ["ASTRAL_RELEASE_VERSION"],
              "platform": "docs",
              "target_description": "Tracked documentation and operator contract of the exact candidate source tree",
              "artifact": {
                  "name": "astraldeep-source-tree",
                  "kind": "source_tree",
                  "immutable_reference": "bundle://docs/source-tree.tar",
                  "sha256": hashlib.sha256(tree.read_bytes()).hexdigest(),
                  "build_identity": f"source-tree:{candidate}",
              },
              "staging_environment": None,
              "runner": {
                  "os": "linux",
                  "architecture": "x86_64",
                  "runner_image": f"{os.environ.get('ImageOS', 'ubuntu')}-{os.environ.get('ImageVersion', 'hosted')}",
                  "runner_name": os.environ.get("RUNNER_NAME", "unknown"),
                  "runner_environment": "github_hosted",
              },
              "workflow": {
                  "name": os.environ.get("GITHUB_WORKFLOW", "release-readiness"),
                  "run_id": os.environ.get("GITHUB_RUN_ID", "1"),
                  "run_attempt": int(os.environ.get("GITHUB_RUN_ATTEMPT", "1")),
                  "job_id": os.environ.get("GITHUB_JOB", "docs-producer"),
              },
              "started_at": now,
              "completed_at": now,
              "outcome": "passed",
              "unavailable_reason": None,
              "unavailability_observation": None,
              "checks": [check("documentation_links"), check("apply_config_reload")],
          }
          schema = validator.load_json_document(
              "specs/060-runtime-reliability-hardening/contracts/release-evidence.schema.json"
          )
          validator.validate_document(report, schema)
          out = root / "docs.json"
          out.write_text(json.dumps(report, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          print(f"wrote schema-valid {out}")
          PY
          test -f build/060/release-evidence/docs.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: evidence-docs
          path: build/060/release-evidence/
          if-no-files-found: error
          retention-days: 14

  # ── The ONLY OIDC/attest authority in the pipeline: the protected reusable
  #    trusted builder reconstructs producer identities from the shared run's
  #    API state and attests one manifest per producer plus the stage manifest. ──
  trusted-builder:
    needs:
      - stage-deploy
      - backend-producer
      - web-producer
      - windows-producer
      - android-producer
      - macos-producer
      - ios-producer
      - watchos-producer
      - docs-producer
    if: always()
    permissions:
      id-token: write
      attestations: write
      actions: read
      contents: read
    uses: ./.github/workflows/release-trusted-builder.yml
    with:
      candidate_sha: ${{ inputs.candidate_sha }}
      request_id: ${{ inputs.request_id }}

  # ── The protected decision. Job id is EXACTLY protected-decision — the
  #    validator refuses --decision-output from any other job, and the ruleset
  #    required check name is "release-readiness / protected-decision". ──
  protected-decision:
    needs:
      - trusted-builder
      - backend-producer
      - web-producer
      - windows-producer
      - android-producer
      - macos-producer
      - ios-producer
      - watchos-producer
      - docs-producer
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TRUSTED_BUILDER_SHA: ${{ vars.RELEASE_TRUSTED_BUILDER_SHA }}
      RELEASE_TRUSTED_BUILDER_IDENTITY: ${{ vars.RELEASE_TRUSTED_BUILDER_IDENTITY }}
      CANDIDATE_SHA: ${{ inputs.candidate_sha }}
      BASE_SHA: ${{ inputs.base_sha }}
    steps:
      - name: Check out the exact candidate with full history
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ inputs.candidate_sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Download every run input by exact artifact id
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/060/api build/060/release-evidence build/060/coverage-inputs \
            build/060/trust/approvals build/060/trust/resolutions \
            build/060/attestation-verification build/060/protected-decision \
            build/060/exception-ledger
          # The backend/tooling coverage artifacts come from the SHARED ci.yml
          # run; producers may still be uploading, so poll briefly.
          for _ in $(seq 1 40); do
            gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts?per_page=100" \
              --paginate --jq '.artifacts[]' > build/060/api/artifacts.ndjson
            if grep -q '"name":"coverage"' build/060/api/artifacts.ndjson \
               && grep -q '"name":"tooling-python-coverage"' build/060/api/artifacts.ndjson; then
              break
            fi
            [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ] && break
            sleep 30
          done
          python3 - <<'PY'
          import json, os, pathlib, subprocess

          lines = pathlib.Path("build/060/api/artifacts.ndjson").read_text(encoding="utf-8")
          artifacts = [json.loads(line) for line in lines.splitlines() if line.strip()]
          repo = os.environ["GITHUB_REPOSITORY"]

          def wanted(name: str) -> str | None:
              if name.startswith("evidence-"):
                  return "build/060/release-evidence"
              if name.startswith("stage-outputs-"):
                  return "build/060/stage"
              if name == "trusted-manifests":
                  return "build/060/trust"
              if name.startswith("windows-unsigned-"):
                  return "build/060/coverage-inputs/windows"
              if name == "coverage":
                  return "build/060/coverage-inputs/backend"
              if name == "tooling-python-coverage":
                  return "build/060/coverage-inputs/tooling"
              return None

          listing = {}
          for artifact in artifacts:
              target = wanted(artifact["name"])
              if target is None:
                  continue
              listing.setdefault(artifact["name"], []).append(artifact["id"])
              zip_path = pathlib.Path(f"build/060/api/{artifact['id']}.zip")
              with zip_path.open("wb") as handle:
                  subprocess.run(
                      ["gh", "api", f"repos/{repo}/actions/artifacts/{artifact['id']}/zip"],
                      check=True, stdout=handle,
                  )
              pathlib.Path(target).mkdir(parents=True, exist_ok=True)
              subprocess.run(["unzip", "-o", "-q", str(zip_path), "-d", target], check=True)
          for name in ("trusted-manifests", "coverage", "tooling-python-coverage"):
              if name not in listing:
                  raise SystemExit(f"required run artifact is missing: {name}")
              if len(listing[name]) != 1:
                  raise SystemExit(f"ambiguous run artifact name: {name}")
          pathlib.Path("build/060/api/selected.json").write_text(
              json.dumps(listing, indent=2, sort_keys=True), encoding="utf-8"
          )
          PY
      # The protected debt-ledger branch is created at the T120 bootstrap; an
      # absent ref FAILS this job by design — never tolerated silently.
      - name: Read the protected debt-ledger head (before evaluation)
        shell: bash
        run: |
          set -euo pipefail
          LEDGER_SHA="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/release-evidence-debt" --jq .object.sha)"
          test "${#LEDGER_SHA}" -eq 40
          echo "LEDGER_SHA=$LEDGER_SHA" >> "$GITHUB_ENV"
          git fetch --no-tags origin "+refs/heads/release-evidence-debt:refs/remotes/origin/release-evidence-debt"
          git archive "$LEDGER_SHA" | tar -x -C build/060/exception-ledger
      - name: Verify every trusted-manifest attestation
        shell: bash
        run: |
          set -euo pipefail
          for manifest in build/060/trust/producers/*.json build/060/trust/stage/*.json; do
            receipt="build/060/api/attest-$(basename "$manifest").json"
            gh attestation verify "$manifest" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release-trusted-builder.yml" \
              --format json > "$receipt"
          done
          python3 - <<'PY'
          import hashlib, json, os, pathlib
          from datetime import datetime, timezone

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          run_attempt = int(os.environ["GITHUB_RUN_ATTEMPT"])
          listing = json.loads(pathlib.Path("build/060/api/selected.json").read_text(encoding="utf-8"))
          trust_artifact_id = str(listing["trusted-manifests"][0])
          now = datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")
          for directory, role in (("producers", "producer"), ("stage", "stage_deploy")):
              for path in sorted(pathlib.Path(f"build/060/trust/{directory}").glob("*.json")):
                  document = json.loads(path.read_text(encoding="utf-8"))
                  manifest_id = document["manifest_id"]
                  member = f"{directory}/{path.name}"
                  receipt = {
                      "manifest_id": manifest_id,
                      "role": role,
                      "verification_outcome": "passed",
                      "repository": repo,
                      "candidate_sha": os.environ["CANDIDATE_SHA"],
                      "protected_builder_sha": os.environ["RELEASE_TRUSTED_BUILDER_SHA"],
                      "protected_builder_identity": os.environ["RELEASE_TRUSTED_BUILDER_IDENTITY"],
                      "manifest_artifact": {
                          "kind": "github_actions_artifact_member",
                          "repository": repo,
                          "run_id": run_id,
                          "run_attempt": run_attempt,
                          "artifact_id": trust_artifact_id,
                          "artifact_name": "trusted-manifests",
                          "member": member,
                          "immutable_reference": (
                              f"gh://{repo}/runs/{run_id}/attempts/{run_attempt}"
                              f"/artifacts/{trust_artifact_id}/members/{member}"
                          ),
                          "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                      },
                      "verified_at": now,
                  }
                  out = pathlib.Path(f"build/060/attestation-verification/{manifest_id}.json")
                  out.write_text(json.dumps(receipt, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
      # The policy copy comes from the PINNED protected commit — never the
      # candidate checkout. Its tar digest is the --protected-policy-sha.
      - name: Extract the pinned protected policy
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RELEASE_TRUSTED_BUILDER_SHA"
          git archive "$RELEASE_TRUSTED_BUILDER_SHA" \
            scripts/validate_release_evidence.py \
            scripts/check_changed_coverage.py \
            specs/060-runtime-reliability-hardening/contracts/windows-deployment-profile.schema.json \
            specs/060-runtime-reliability-hardening/contracts/release-evidence.schema.json \
            specs/060-runtime-reliability-hardening/contracts/release-trust.schema.json \
            > build/060/protected-policy.tar
          PROTECTED_POLICY_SHA256="$(sha256sum build/060/protected-policy.tar | cut -d ' ' -f 1)"
          test "${#PROTECTED_POLICY_SHA256}" -eq 64
          echo "PROTECTED_POLICY_SHA256=$PROTECTED_POLICY_SHA256" >> "$GITHUB_ENV"
          mkdir -p build/060/protected-policy
          tar -xf build/060/protected-policy.tar -C build/060/protected-policy
          test -z "$(find build/060/protected-policy -type l -print -quit)"
      - name: Run the protected changed-code coverage gate
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's|/app/backend|backend|g' build/060/coverage-inputs/backend/coverage.xml
          WINDOWS_COVERAGE="$(find build/060/coverage-inputs/windows -name windows-coverage.xml -print -quit)"
          test -n "$WINDOWS_COVERAGE"
          python3 build/060/protected-policy/scripts/check_changed_coverage.py \
            --repo . \
            --event-name "${GITHUB_EVENT_NAME/workflow_dispatch/manual}" \
            --base-sha "$BASE_SHA" \
            --candidate-sha "$CANDIDATE_SHA" \
            --backend-python build/060/coverage-inputs/backend/coverage.xml \
            --tooling-python build/060/coverage-inputs/tooling/tooling-python.xml \
            --windows-python "$WINDOWS_COVERAGE" \
            --javascript build/060/release-evidence/coverage/web-istanbul.json \
            --android-app build/060/release-evidence/coverage/android-app.xml \
            --android-core build/060/release-evidence/coverage/android-core.xml \
            --apple build/060/release-evidence/coverage/apple-ios-xccov.json \
            --apple build/060/release-evidence/coverage/apple-macos-xccov.json \
            --apple build/060/release-evidence/coverage/apple-watchos-xccov.json \
            --fail-under 90 \
            --output build/060/release-evidence/coverage/changed-code.json
          COVERAGE_PERCENT="$(python3 -c "import json; print(json.load(open('build/060/release-evidence/coverage/changed-code.json'))['combined']['percent'])")"
          echo "COVERAGE_PERCENT=$COVERAGE_PERCENT" >> "$GITHUB_ENV"
      # Mechanical canonical assembly (content-derived UUIDv5); every claim in
      # the assembled set is still re-validated by the protected policy below.
      - name: Assemble the canonical evidence set
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import importlib.util, json, pathlib, sys
          from datetime import datetime, timezone

          spec = importlib.util.spec_from_file_location(
              "astral_prepare_release_evidence", "scripts/prepare_release_evidence.py"
          )
          prepare = importlib.util.module_from_spec(spec)
          sys.modules[spec.name] = prepare
          spec.loader.exec_module(prepare)

          root = pathlib.Path("build/060/release-evidence")
          reports, requests = [], []
          for path in sorted(root.glob("*.json")):
              document = json.loads(path.read_text(encoding="utf-8"))
              if document.get("document_type") == "platform_evidence":
                  reports.append(document)
              elif document.get("document_type") == "evidence_exception_request":
                  requests.append(document)
              elif document.get("document_type") == "release_evidence_set":
                  raise SystemExit("producers must not upload a pre-assembled evidence set")
          evidence_set = prepare.assemble_evidence_set(
              reports, requests, now=datetime.now(timezone.utc)
          )
          out = root / "release-evidence-set.json"
          out.write_text(
              json.dumps(evidence_set, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          print(f"assembled {out} for {len(reports)} platform reports")
          PY
      - name: Upload the canonical evidence bundle
        id: evidence-upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-evidence
          path: build/060/release-evidence/
          if-no-files-found: error
          retention-days: 90
      - name: Bind the exact evidence-set and coverage artifact members
        shell: bash
        env:
          EVIDENCE_ARTIFACT_ID: ${{ steps.evidence-upload.outputs.artifact-id }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib, json, os, pathlib

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          run_attempt = int(os.environ["GITHUB_RUN_ATTEMPT"])
          artifact_id = os.environ["EVIDENCE_ARTIFACT_ID"]

          def member_record(member: str, path: str) -> dict:
              digest = hashlib.sha256(pathlib.Path(path).read_bytes()).hexdigest()
              return {
                  "kind": "github_actions_artifact_member",
                  "repository": repo,
                  "run_id": run_id,
                  "run_attempt": run_attempt,
                  "artifact_id": str(artifact_id),
                  "artifact_name": "release-evidence",
                  "member": member,
                  "immutable_reference": (
                      f"gh://{repo}/runs/{run_id}/attempts/{run_attempt}"
                      f"/artifacts/{artifact_id}/members/{member}"
                  ),
                  "sha256": digest,
              }

          out = pathlib.Path("build/060/protected-decision")
          out.joinpath("evidence-set-artifact.json").write_text(
              json.dumps(member_record(
                  "release-evidence-set.json",
                  "build/060/release-evidence/release-evidence-set.json",
              ), indent=2, sort_keys=True) + "\n", encoding="utf-8",
          )
          out.joinpath("coverage-artifact.json").write_text(
              json.dumps(member_record(
                  "coverage/changed-code.json",
                  "build/060/release-evidence/coverage/changed-code.json",
              ), indent=2, sort_keys=True) + "\n", encoding="utf-8",
          )
          PY
      - name: Run the protected release-evidence policy and emit the decision
        shell: bash
        run: |
          set -euo pipefail
          VALID_UNTIL="$(date -u -d '+20 hours' +%Y-%m-%dT%H:%M:%SZ)"
          python3 build/060/protected-policy/scripts/validate_release_evidence.py \
            --schema build/060/protected-policy/specs/060-runtime-reliability-hardening/contracts/release-evidence.schema.json \
            --trust-schema build/060/protected-policy/specs/060-runtime-reliability-hardening/contracts/release-trust.schema.json \
            --deployment-profile-schema build/060/protected-policy/specs/060-runtime-reliability-hardening/contracts/windows-deployment-profile.schema.json \
            --evidence-dir build/060/release-evidence \
            --base-sha "$BASE_SHA" \
            --candidate-sha "$CANDIDATE_SHA" \
            --repository "$GITHUB_REPOSITORY" \
            --trusted-provenance-dir build/060/trust/producers \
            --trusted-stage-deploy build/060/trust/stage/trusted-stage-deploy.json \
            --trusted-approvals-dir build/060/trust/approvals \
            --trusted-debt-resolutions-dir build/060/trust/resolutions \
            --attestation-verification-dir build/060/attestation-verification \
            --protected-builder-sha "$RELEASE_TRUSTED_BUILDER_SHA" \
            --protected-builder-identity "$RELEASE_TRUSTED_BUILDER_IDENTITY" \
            --protected-policy-sha "$PROTECTED_POLICY_SHA256" \
            --exception-ledger-repository "$GITHUB_REPOSITORY" \
            --exception-ledger-ref refs/heads/release-evidence-debt \
            --exception-ledger-commit "$LEDGER_SHA" \
            --exception-ledger-checkout build/060/exception-ledger \
            --coverage-percent "$COVERAGE_PERCENT" \
            --coverage-artifact build/060/protected-decision/coverage-artifact.json \
            --evidence-set-artifact build/060/protected-decision/evidence-set-artifact.json \
            --protected-workflow-ref "$GITHUB_REPOSITORY/.github/workflows/release-trusted-builder.yml@$RELEASE_TRUSTED_BUILDER_SHA" \
            --valid-until "$VALID_UNTIL" \
            --decision-output build/060/protected-decision/trusted-release-decision.json
      - name: Re-read the protected debt-ledger head (after evaluation)
        shell: bash
        run: |
          set -euo pipefail
          AFTER="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/release-evidence-debt" --jq .object.sha)"
          test "$AFTER" = "$LEDGER_SHA" || { echo "::error::debt ledger moved during evaluation" >&2; exit 1; }
      - name: Upload the trusted release decision
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trusted-release-decision
          path: build/060/protected-decision/
          if-no-files-found: error
          retention-days: 90

  stage-cleanup:
    if: always()
    needs:
      - stage-deploy
      - windows-candidate
      - backend-producer
      - web-producer
      - windows-producer
      - android-producer
      - macos-producer
      - ios-producer
      - watchos-producer
      - docs-producer
      - trusted-builder
      - protected-decision
    runs-on: [self-hosted, astral-staging]
    timeout-minutes: 20
    env:
      ASTRAL_STAGING_RUNNER_TRUSTED: "true"
      ASTRAL_STAGING_ENDPOINT: ${{ secrets.ASTRAL_STAGING_ENDPOINT }}
      ASTRAL_STAGING_PROBE_TOKEN: ${{ secrets.ASTRAL_STAGING_PROBE_TOKEN }}
      STAGING_POSTGRES_IMAGE: ${{ secrets.STAGING_POSTGRES_IMAGE }}
      STAGING_KEYCLOAK_IMAGE: ${{ secrets.STAGING_KEYCLOAK_IMAGE }}
      STAGING_SCHEMA_BASELINE_IMAGE: ${{ secrets.STAGING_SCHEMA_BASELINE_IMAGE }}
      STAGING_RUNTIME_ENV_FILE: ${{ secrets.STAGING_RUNTIME_ENV_FILE }}
      STAGING_DB_USER: ${{ secrets.STAGING_DB_USER }}
      STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
      STAGING_DB_NAME: ${{ secrets.STAGING_DB_NAME }}
      STAGING_KEYCLOAK_DB_USER: ${{ secrets.STAGING_KEYCLOAK_DB_USER }}
      STAGING_KEYCLOAK_DB_PASSWORD: ${{ secrets.STAGING_KEYCLOAK_DB_PASSWORD }}
      STAGING_KEYCLOAK_DB_NAME: ${{ secrets.STAGING_KEYCLOAK_DB_NAME }}
      STAGING_KEYCLOAK_ADMIN_USER: ${{ secrets.STAGING_KEYCLOAK_ADMIN_USER }}
      STAGING_KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.STAGING_KEYCLOAK_ADMIN_PASSWORD }}
      STAGING_BIND_PORT: ${{ secrets.STAGING_BIND_PORT }}
      STAGING_ENVIRONMENT_ID: rr-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Check out the exact candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ inputs.candidate_sha }}
          persist-credentials: false
      - name: Tear down the staging namespace
        run: python3 scripts/run_candidate_staging.py cleanup --environment-id "$STAGING_ENVIRONMENT_ID"
