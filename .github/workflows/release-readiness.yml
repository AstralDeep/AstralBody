          export TEST_RUNNER_RUNNER_OS="$RUNNER_OS" TEST_RUNNER_RUNNER_ARCH="$RUNNER_ARCH" TEST_RUNNER_RUNNER_NAME="$RUNNER_NAME"
          result="build/060/coverage-result.xcresult"
          rm -rf "$result"
          set +e
          xcodebuild -project "${APP_PROJECT}" -scheme "${PRODUCER_SCHEME}" \
            -destination "${DESTINATION}" -configuration Debug \
            CODE_SIGNING_ALLOWED=NO -enableCodeCoverage YES \
            -derivedDataPath build/060/dd \
            -resultBundlePath "$result" \
            -only-testing:${PRODUCER_ONLY_TESTING} \
            test-without-building
          status=$?
          set -e
          if [[ -d "$result" ]]; then
