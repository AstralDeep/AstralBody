# Spec 060 (T107/T119) — the same-candidate release-readiness evidence matrix.
# One staging deployment (stage-deploy, left running) feeds eight platform
# evidence producers that all test the SAME candidate SHA and the SAME staged
# artifacts; the protected trusted builder attests reconstructed identities;
# the protected-decision job re-validates everything with the PINNED policy
# copy and emits the only trusted release decision. Candidate-facing jobs are
# read-only; the sole OIDC/attest authority is the trusted-builder call.
#
# Required check (rulesets, T120): "release-readiness / protected-decision" —
# produced when ci.yml's caller job id is `release-readiness`.
name: release-readiness

run-name: release-readiness ${{ inputs.request_id }}

on:
  workflow_call:
    inputs:
      candidate_sha:
        description: Exact candidate commit every producer must test
        required: true
        type: string
      base_sha:
        description: Verified comparison base for the changed-code gate
        required: true
        type: string
      request_id:
        description: Unique request id embedded in the run-name
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Exact candidate commit every producer must test
        required: true
        type: string
      base_sha:
        description: Verified comparison base for the changed-code gate
        required: true
        type: string
      request_id:
        description: Unique request id embedded in the run-name
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: release-readiness-${{ inputs.candidate_sha }}
  cancel-in-progress: false

jobs:
  # ── The staged image is the EXACT ci.yml build artifact pushed under an
  #    immutable digest-qualified reference — never rebuilt. On dispatch the
  #    candidate tag must already exist from a prior ci.yml call. This job is
  #    the only packages-write authority in the pipeline. ──
  publish-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      candidate_image: ${{ steps.digest.outputs.candidate_image }}
    steps:
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push the shared-run image under the immutable candidate tag
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: image
          path: /tmp
      - name: Load, tag, and push the exact built image
        if: github.event_name != 'workflow_dispatch'
        run: |
          set -euo pipefail
          docker load -i /tmp/astraldeep.tar
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker tag astraldeep:ci "ghcr.io/$REPO_LC:candidate-${{ inputs.candidate_sha }}"
          docker push "ghcr.io/$REPO_LC:candidate-${{ inputs.candidate_sha }}"
      - name: Resolve the immutable candidate image digest
        id: digest
        run: |
          set -euo pipefail
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          TAG="ghcr.io/$REPO_LC:candidate-${{ inputs.candidate_sha }}"
          if ! DIGEST=$(docker buildx imagetools inspect "$TAG" --format '{{.Manifest.Digest}}'); then
            echo "::error::no candidate image for ${{ inputs.candidate_sha }} — run the ci.yml build (which calls this workflow) for the candidate first" >&2
            exit 1
          fi
          echo "candidate_image=ghcr.io/$REPO_LC@$DIGEST" >> "$GITHUB_OUTPUT"

  # ── Qualifying staging deployment on the trusted self-hosted staging host.
  #    Env gate mirrors scripts/run_candidate_staging.py::_required_environment
  #    exactly; the namespace is left running for the producer jobs. ──
  stage-deploy:
    needs: publish-candidate
    runs-on: [self-hosted, astral-staging]
    timeout-minutes: 45
    env:
      ASTRAL_STAGING_RUNNER_TRUSTED: "true"
      ASTRAL_STAGING_ENDPOINT: ${{ secrets.ASTRAL_STAGING_ENDPOINT }}
      ASTRAL_STAGING_PROBE_TOKEN: ${{ secrets.ASTRAL_STAGING_PROBE_TOKEN }}
      STAGING_POSTGRES_IMAGE: ${{ secrets.STAGING_POSTGRES_IMAGE }}
      STAGING_KEYCLOAK_IMAGE: ${{ secrets.STAGING_KEYCLOAK_IMAGE }}
      STAGING_SCHEMA_BASELINE_IMAGE: ${{ secrets.STAGING_SCHEMA_BASELINE_IMAGE }}
      STAGING_RUNTIME_ENV_FILE: ${{ secrets.STAGING_RUNTIME_ENV_FILE }}
      STAGING_DB_USER: ${{ secrets.STAGING_DB_USER }}
      STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
      STAGING_DB_NAME: ${{ secrets.STAGING_DB_NAME }}
      STAGING_KEYCLOAK_DB_USER: ${{ secrets.STAGING_KEYCLOAK_DB_USER }}
      STAGING_KEYCLOAK_DB_PASSWORD: ${{ secrets.STAGING_KEYCLOAK_DB_PASSWORD }}
      STAGING_KEYCLOAK_DB_NAME: ${{ secrets.STAGING_KEYCLOAK_DB_NAME }}
      STAGING_KEYCLOAK_ADMIN_USER: ${{ secrets.STAGING_KEYCLOAK_ADMIN_USER }}
      STAGING_KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.STAGING_KEYCLOAK_ADMIN_PASSWORD }}
      STAGING_BIND_PORT: ${{ secrets.STAGING_BIND_PORT }}
      RELEASE_TRUSTED_BUILDER_SHA: ${{ vars.RELEASE_TRUSTED_BUILDER_SHA }}
      RELEASE_TRUSTED_BUILDER_IDENTITY: ${{ vars.RELEASE_TRUSTED_BUILDER_IDENTITY }}
      ASTRAL_STAGE_OUTPUTS_ARTIFACT_NAME: stage-outputs-${{ inputs.request_id || github.run_id }}
      ASTRAL_CANDIDATE_IMAGE: ${{ needs.publish-candidate.outputs.candidate_image }}
      STAGING_ENVIRONMENT_ID: rr-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      endpoint: ${{ steps.stage.outputs.endpoint }}
      environment_id: ${{ steps.stage.outputs.environment_id }}
      artifact_id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: Check out the exact candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ inputs.candidate_sha }}
          persist-credentials: false
      - name: Validate the tracked staging fixture set
        run: python3 scripts/run_candidate_staging.py validate-fixtures --manifest backend/tests/fixtures/runtime_reliability_060/staging/fixture-manifest.json
      - name: Deploy the candidate namespace and leave it running
        id: stage
        run: |
          set -euo pipefail
          mkdir -p build/060
          python3 scripts/run_candidate_staging.py deploy \
            --candidate-sha "${{ inputs.candidate_sha }}" \
            --candidate-image "$ASTRAL_CANDIDATE_IMAGE" \
            --fixture-manifest backend/tests/fixtures/runtime_reliability_060/staging/fixture-manifest.json \
            --environment-id "$STAGING_ENVIRONMENT_ID" \
            --outputs build/060/staging-outputs.json \
            --trusted-manifest build/060/trusted-stage-deploy.json \
            --leave-running
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          outputs = json.load(open("build/060/staging-outputs.json", encoding="utf-8"))
          print(f"endpoint={outputs['endpoint']}")
          print(f"environment_id={outputs['environment_id']}")
          PY
      - name: Archive the trusted stage outputs
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: stage-outputs-${{ inputs.request_id || github.run_id }}
          path: |
            build/060/staging-outputs.json
            build/060/trusted-stage-deploy.json
          if-no-files-found: error
          retention-days: 14

  # ── Build-once Windows candidate (feature 068 reusable workflow); its exact
  #    artifact id / executable digest feed the windows producer and, later,
  #    the bridge signer. ──
  windows-candidate:
    needs: stage-deploy
    uses: ./.github/workflows/build-windows-candidate.yml
    with:
      candidate_sha: ${{ inputs.candidate_sha }}
    secrets:
      staging_access_token: ${{ secrets.ASTRAL_WINDOWS_SMOKE_TOKEN }}

  backend-producer:
    needs: [stage-deploy, publish-candidate]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: astral
          POSTGRES_PASSWORD: astral_ci
          POSTGRES_DB: astraldeep
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U astral -d astraldeep"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ASTRAL_STAGING_PROBE_TOKEN: ${{ secrets.ASTRAL_STAGING_PROBE_TOKEN }}
    steps:
      - name: Check out the exact candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ inputs.candidate_sha }}
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: stage-outputs-${{ inputs.request_id || github.run_id }}
          path: build/060/stage
      - name: Pull the exact staged candidate image by digest
        run: docker pull "${{ needs.publish-candidate.outputs.candidate_image }}"
      # The producer module re-executes the admission/scheduler/migration
      # suites, so it runs INSIDE the candidate container against a real
      # Postgres — the same recipe as the ci.yml test job.
      - name: Produce backend release evidence inside the candidate container
        run: |
          set -euo pipefail
          mkdir -p build/060/release-evidence
          docker run --rm --network host \
            -v "$PWD/backend:/app/backend" \
            -v "$PWD/scripts:/app/scripts:ro" \
            -v "$PWD/specs:/app/specs:ro" \
            -v "$PWD/tooling/python-ci:/ci/python:ro" \
            -v "$PWD/build:/app/build" \
            -e ASTRAL_ENV=development \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_NAME=astraldeep \
            -e DB_USER=astral \
            -e DB_PASSWORD=astral_ci \
            -e AGENT_API_KEY=ci-release-agent-key \
            -e AUDIT_HMAC_SECRET=ci-release-hmac-secret \
            -e LOOP_GUARD_ENFORCE=1 \
            -e ASTRAL_STAGING_URL="${{ needs.stage-deploy.outputs.endpoint }}" \
            -e ASTRAL_RELEASE_EVIDENCE_OUTPUT=/app/build/060/release-evidence/backend.json \
            -e ASTRAL_RELEASE_STAGING_FILE=/app/build/060/stage/staging-outputs.json \
            -e ASTRAL_RELEASE_CANDIDATE_SHA="${{ inputs.candidate_sha }}" \
            -e ASTRAL_RELEASE_ID="release-060-${{ inputs.candidate_sha }}" \
            -e ASTRAL_RELEASE_VERSION="${{ vars.RELEASE_CANDIDATE_VERSION || '0.4.0' }}" \
            -e ASTRAL_STAGING_PROBE_TOKEN \
            -e ASTRAL_RUNNER_ENVIRONMENT=github_hosted \
            -e ASTRAL_RUNNER_IMAGE="${ImageOS:-ubuntu}-${ImageVersion:-hosted}" \
            -e GITHUB_JOB -e GITHUB_RUN_ID -e GITHUB_RUN_ATTEMPT -e GITHUB_WORKFLOW \
            -e RUNNER_ARCH -e RUNNER_NAME -e RUNNER_OS \
            -w /app/backend --entrypoint bash \
            "${{ needs.publish-candidate.outputs.candidate_image }}" \
            -c "python -m pip install --require-hashes -r /ci/python/requirements.lock.txt && python -m pytest tests/perf/release_backend_060.py -q -m perf"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: evidence-backend
          path: build/060/release-evidence/
          if-no-files-found: error
          retention-days: 14

  web-producer:
    needs: stage-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ASTRAL_RELEASE_USERNAME: ${{ secrets.ASTRAL_RELEASE_USERNAME }}
      ASTRAL_RELEASE_PASSWORD: ${{ secrets.ASTRAL_RELEASE_PASSWORD }}
      ASTRAL_RELEASE_ID: release-060-${{ inputs.candidate_sha }}
      ASTRAL_RELEASE_VERSION: ${{ vars.RELEASE_CANDIDATE_VERSION || '0.4.0' }}
      ASTRAL_RELEASE_LIFECYCLE_AGENT_ID: ${{ vars.RELEASE_LIFECYCLE_AGENT_ID || 'dice-roller-1' }}
      ASTRAL_RELEASE_LIFECYCLE_STATES: ${{ vars.RELEASE_LIFECYCLE_STATES || 'starting,online' }}
    steps:
      - name: Check out the exact candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ inputs.candidate_sha }}
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: stage-outputs-${{ inputs.request_id || github.run_id }}
          path: build/060/stage
      - name: Run the browser release lane in the digest-pinned image
        run: |
          set -euo pipefail
          PLAYWRIGHT_IMAGE="$(tr -d '\n' < tooling/web-ci/playwright-image.txt)"
          test "${PLAYWRIGHT_IMAGE#*@sha256:}" != "$PLAYWRIGHT_IMAGE"
          docker pull "$PLAYWRIGHT_IMAGE"
          mkdir -p build/060/release-evidence/coverage
          docker run --rm -v "$PWD:/work" -w /work/tooling/web-ci \
            -e ASTRAL_PLAYWRIGHT_IMAGE="$PLAYWRIGHT_IMAGE" \
            -e ASTRAL_RELEASE_USERNAME -e ASTRAL_RELEASE_PASSWORD \
            -e ASTRAL_RELEASE_ID -e ASTRAL_RELEASE_VERSION \
            -e ASTRAL_RELEASE_STAGING_FILE=/work/build/060/stage/staging-outputs.json \
            -e ASTRAL_RELEASE_LIFECYCLE_AGENT_ID -e ASTRAL_RELEASE_LIFECYCLE_STATES \
            -e ASTRAL_RUNNER_ENVIRONMENT=github_hosted \
            -e GITHUB_JOB -e GITHUB_RUN_ID -e GITHUB_RUN_ATTEMPT -e GITHUB_WORKFLOW \
            -e RUNNER_ARCH -e RUNNER_NAME -e RUNNER_OS \
            "$PLAYWRIGHT_IMAGE" sh -lc \
            'test "$(corepack npm --version)" = "11.16.0" && corepack npm ci --ignore-scripts && corepack npm run check:package-manager && corepack npm run browser:release -- --base-url "${{ needs.stage-deploy.outputs.endpoint }}" --candidate-sha "${{ inputs.candidate_sha }}" --output /work/build/060/release-evidence/web.json --coverage-output /work/build/060/release-evidence/coverage/web-v8.json --coverage-istanbul-output /work/build/060/release-evidence/coverage/web-istanbul.json'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: evidence-web
          path: build/060/release-evidence/
          if-no-files-found: error
          retention-days: 14

  windows-producer:
    needs: [stage-deploy, windows-candidate]
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      ASTRAL_WINDOWS_EXE_SHA256: ${{ needs.windows-candidate.outputs.executable_sha256 }}
      ASTRAL_WINDOWS_ARTIFACT_ID: ${{ needs.windows-candidate.outputs.artifact_id }}
      ASTRAL_WINDOWS_SMOKE_TOKEN: ${{ secrets.ASTRAL_WINDOWS_SMOKE_TOKEN }}
      ASTRAL_STAGING_URL: ${{ needs.stage-deploy.outputs.endpoint }}
      ASTRAL_RELEASE_CANDIDATE_SHA: ${{ inputs.candidate_sha }}
      ASTRAL_RELEASE_ID: release-060-${{ inputs.candidate_sha }}
      ASTRAL_RELEASE_VERSION: ${{ vars.RELEASE_CANDIDATE_VERSION || '0.4.0' }}
      ASTRAL_RELEASE_LIFECYCLE_AGENT_ID: ${{ vars.RELEASE_LIFECYCLE_AGENT_ID || 'dice-roller-1' }}
      ASTRAL_RELEASE_LIFECYCLE_STATES: ${{ vars.RELEASE_LIFECYCLE_STATES || 'starting,online' }}
      ASTRAL_RUNNER_ENVIRONMENT: github_hosted
      PYTHONUTF8: "1"
    steps:
      - name: Check out the exact candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ inputs.candidate_sha }}
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            windows-client/requirements-release.lock.txt
            tooling/python-ci/requirements.lock.txt
      - name: Install hash-locked client runtime requirements
        run: python -m pip install --require-hashes -r windows-client/requirements-release.lock.txt
      - name: Install hash-locked CI-only Python tooling
        run: python -m pip install --require-hashes -r tooling/python-ci/requirements.lock.txt
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: stage-outputs-${{ inputs.request_id || github.run_id }}
          path: build/060/stage
      - name: Download the build-once candidate by exact artifact id
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ needs.windows-candidate.outputs.artifact_id }}
          path: build/windows-candidate-download
      - name: Re-hash the exact archived executable
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = Get-ChildItem -Recurse build\windows-candidate-download -Filter AstralDeep.exe | Select-Object -First 1
          if (-not $exe) { throw "downloaded candidate artifact lacks AstralDeep.exe" }
          $digest = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($digest -ne $env:ASTRAL_WINDOWS_EXE_SHA256) {
            throw "downloaded executable digest $digest differs from the recorded executable_sha256"
          }
          "ASTRAL_WINDOWS_EXE=$($exe.FullName)" >> $env:GITHUB_ENV
          "ASTRAL_WINDOWS_CANDIDATE_DIR=$($exe.DirectoryName)" >> $env:GITHUB_ENV
      - name: Produce Windows release evidence against staging
        shell: pwsh
        env:
          ASTRAL_RELEASE_EVIDENCE_OUTPUT: ${{ github.workspace }}/build/060/release-evidence/windows.json
          ASTRAL_RELEASE_STAGING_FILE: ${{ github.workspace }}/build/060/stage/staging-outputs.json
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          New-Item -ItemType Directory -Force build\060\release-evidence | Out-Null
          python -m pytest windows-client/tests/release_evidence_060.py -q
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: evidence-windows
          path: build/060/release-evidence/
          if-no-files-found: error
          retention-days: 14

  android-producer:
    needs: stage-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ASTRAL_STAGING_URL: ${{ needs.stage-deploy.outputs.endpoint }}
      ASTRAL_STAGING_ACCESS_TOKEN: ${{ secrets.ASTRAL_STAGING_ACCESS_TOKEN }}
      ASTRAL_RELEASE_CANDIDATE_SHA: ${{ inputs.candidate_sha }}
      ASTRAL_RELEASE_ID: release-060-${{ inputs.candidate_sha }}
      ASTRAL_RELEASE_VERSION: ${{ vars.RELEASE_CANDIDATE_VERSION || '0.4.0' }}
      ASTRAL_RELEASE_LIFECYCLE_AGENT_ID: ${{ vars.RELEASE_LIFECYCLE_AGENT_ID || 'dice-roller-1' }}
      ASTRAL_RELEASE_LIFECYCLE_STATES: ${{ vars.RELEASE_LIFECYCLE_STATES || 'starting,online' }}
    steps:
      - name: Check out the exact candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ inputs.candidate_sha }}
          persist-credentials: false
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "17"
      - name: Resolve Gradle version from the committed wrapper
        id: wrapper
        working-directory: android-client
        run: |
          v=$(sed -n 's/^distributionUrl=.*gradle-\([0-9][0-9.]*\)-\(bin\|all\)\.zip$/\1/p' gradle/wrapper/gradle-wrapper.properties)
          test -n "$v" || { echo "could not parse Gradle version from wrapper properties" >&2; exit 1; }
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3
        with:
          gradle-version: ${{ steps.wrapper.outputs.version }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: stage-outputs-${{ inputs.request_id || github.run_id }}
          path: build/060/stage
      # The toolchain canary is a reached fail-closed diagnostic; its JSON is
      # handed to the instrumented producer as a base64 argument.
      - name: Run the Android next-major readiness canary diagnostic
        run: >-
          python3 scripts/run_android_next_major_canary.py
          android-client/gradle/next-major-canary.properties
          --allow-unreleased
          --verify-official-availability
          --output build/060/android-next-major-readiness.json
      - name: Encode staging and canary inputs for instrumentation
        run: |
          set -euo pipefail
          echo "STAGING_B64=$(base64 -w0 build/060/stage/staging-outputs.json)" >> "$GITHUB_ENV"
          echo "CANARY_B64=$(base64 -w0 build/060/android-next-major-readiness.json)" >> "$GITHUB_ENV"
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Produce Android release evidence on the emulator
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          working-directory: android-client
          script: |
            gradle :app:connectedDebugAndroidTest --no-daemon --stacktrace \
              -Pandroid.testInstrumentationRunnerArguments.class=com.personalailabs.astraldeep.app.ReleaseEvidenceInstrumentedTest \
              -Pandroid.testInstrumentationRunnerArguments.astralStagingUrl="$ASTRAL_STAGING_URL" \
              -Pandroid.testInstrumentationRunnerArguments.astralAccessToken="$ASTRAL_STAGING_ACCESS_TOKEN" \
              -Pandroid.testInstrumentationRunnerArguments.astralCandidateSha="$ASTRAL_RELEASE_CANDIDATE_SHA" \
              -Pandroid.testInstrumentationRunnerArguments.astralReleaseId="$ASTRAL_RELEASE_ID" \
              -Pandroid.testInstrumentationRunnerArguments.astralReleaseVersion="$ASTRAL_RELEASE_VERSION" \
              -Pandroid.testInstrumentationRunnerArguments.astralLifecycleAgentId="$ASTRAL_RELEASE_LIFECYCLE_AGENT_ID" \
              -Pandroid.testInstrumentationRunnerArguments.astralLifecycleStates="$ASTRAL_RELEASE_LIFECYCLE_STATES" \
              -Pandroid.testInstrumentationRunnerArguments.astralStagingEnvironmentB64="$STAGING_B64" \
              -Pandroid.testInstrumentationRunnerArguments.astralToolchainCanaryB64="$CANARY_B64" \
              -Pandroid.testInstrumentationRunnerArguments.astralRunnerImage="${ImageOS:-ubuntu}-${ImageVersion:-hosted}" \
              -Pandroid.testInstrumentationRunnerArguments.astralRunnerName="$RUNNER_NAME" \
              -Pandroid.testInstrumentationRunnerArguments.astralRunnerArch="$RUNNER_ARCH" \
              -Pandroid.testInstrumentationRunnerArguments.astralRunnerEnvironment=github_hosted \
              -Pandroid.testInstrumentationRunnerArguments.astralWorkflowName="$GITHUB_WORKFLOW" \
              -Pandroid.testInstrumentationRunnerArguments.astralRunId="$GITHUB_RUN_ID" \
              -Pandroid.testInstrumentationRunnerArguments.astralRunAttempt="$GITHUB_RUN_ATTEMPT" \
              -Pandroid.testInstrumentationRunnerArguments.astralJobId="$GITHUB_JOB"
            device_path="$(adb logcat -d | sed -n 's/.*release_evidence_output=\(\S*\).*/\1/p' | tail -n 1)"
            test -n "$device_path" || { echo "instrumented producer logged no release_evidence_output" >&2; exit 1; }
            mkdir -p ../build/060/release-evidence
            adb pull "$device_path" ../build/060/release-evidence-device
            cp -R ../build/060/release-evidence-device/. ../build/060/release-evidence/
            test -f ../build/060/release-evidence/android.json
      # The report references the exact tested APK bytes as
      # bundle://android/app-debug.apk — place them at that member path.
      - name: Bundle the tested APK bytes and Kover coverage inputs
        working-directory: android-client
        run: |
          set -euo pipefail
