# Spec 060 (T119) — the read-only publication controller. It verifies the
# attested trusted decision, the pinned bridge bytes, and the absence of any
# tag/release collision BEFORE calling the environment-approved publisher
# (the only write authority in the release path). The controller itself holds
# no write permission of its own; the reusable publisher's job-scoped grant is
# capped by the `publish` caller job below.
name: release-windows-publisher-controller

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Decision-bound candidate commit to publish
        required: true
        type: string
      release_version:
        description: Strict SemVer release version (no leading v)
        required: true
        type: string
      mode:
        description: disposable rehearses draft-only; official publishes
        required: true
        type: choice
        options:
          - disposable
          - official
        default: disposable
      readiness_run_id:
        description: Run id whose protected-decision produced the trusted decision
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  verify-decision:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read
    outputs:
      decision_artifact_id: ${{ steps.locate.outputs.decision_artifact_id }}
    env:
      GH_TOKEN: ${{ github.token }}
      CANDIDATE_SHA: ${{ inputs.candidate_sha }}
      RELEASE_VERSION: ${{ inputs.release_version }}
      READINESS_RUN_ID: ${{ inputs.readiness_run_id }}
      RELEASE_BRIDGE_WORKFLOW_SHA256: ${{ vars.RELEASE_BRIDGE_WORKFLOW_SHA256 }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Locate, download, and verify the trusted decision by exact id
        id: locate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/060/decision
          DECISION_ARTIFACT_ID="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$READINESS_RUN_ID/artifacts?per_page=100" \
            --jq '[.artifacts[] | select(.name == "trusted-release-decision")][0].id // empty')"
          test -n "$DECISION_ARTIFACT_ID" || {
            echo "::error::run $READINESS_RUN_ID exposes no trusted-release-decision artifact" >&2
            exit 1
          }
          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$DECISION_ARTIFACT_ID/zip" > build/060/decision.zip
          unzip -o -q build/060/decision.zip -d build/060/decision
          gh attestation verify build/060/decision/trusted-release-decision.json \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release-trusted-builder.yml"
          echo "decision_artifact_id=$DECISION_ARTIFACT_ID" >> "$GITHUB_OUTPUT"
      - name: Re-check decision bindings, lifetime, and bridge bytes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, pathlib, re
          from datetime import datetime, timezone

          decision = json.loads(pathlib.Path(
              "build/060/decision/trusted-release-decision.json"
          ).read_text(encoding="utf-8"))
          if decision["candidate_sha"] != os.environ["CANDIDATE_SHA"]:
              raise SystemExit("decision candidate SHA differs from the requested candidate")
          if decision["decision"] != "passed":
              raise SystemExit("trusted decision did not pass")
          if decision["required_check_name"] != "release-readiness / protected-decision":
              raise SystemExit("decision carries the wrong required check name")
          valid_until = datetime.fromisoformat(
              decision["valid_until"].replace("Z", "+00:00")
          )
          if valid_until <= datetime.now(timezone.utc):
              raise SystemExit("trusted decision expired (valid_until elapsed)")
          if not re.fullmatch(
              r"(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)",
              os.environ["RELEASE_VERSION"],
          ):
              raise SystemExit("release_version must be strict SemVer without a leading v")
          PY
          # Independently pinned bridge bytes: the bridge signs at the tag ==
          # candidate commit, so its blob hash there must equal the recorded
          # protected value (repository variable, set at T120 checkpoint 1).
          BRIDGE_SHA256="$(git show "$CANDIDATE_SHA:.github/workflows/release-windows.yml" | sha256sum | cut -d ' ' -f 1)"
          test -n "$RELEASE_BRIDGE_WORKFLOW_SHA256" || {
            echo "::error::RELEASE_BRIDGE_WORKFLOW_SHA256 repository variable is unset" >&2
            exit 1
          }
          test "$BRIDGE_SHA256" = "$RELEASE_BRIDGE_WORKFLOW_SHA256" || {
            echo "::error::bridge workflow bytes at $CANDIDATE_SHA differ from the pinned bridge_workflow_sha256" >&2
            exit 1
          }
      - name: Refuse any tag, release, or asset collision
        shell: bash
        run: |
          set -euo pipefail
          TAG="v$RELEASE_VERSION"
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" > /dev/null 2>&1; then
            echo "::error::tag $TAG already exists — replacement is refused" >&2
            exit 1
          fi
          if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" > /dev/null 2>&1; then
            echo "::error::a release for $TAG already exists — replacement is refused" >&2
            exit 1
          fi

  publish:
    needs: verify-decision
    # Reusable-workflow grants are capped by this caller job; the publisher's
    # own job re-declares exactly the same job-scoped grant.
    permissions:
      contents: write
      actions: read
    uses: ./.github/workflows/release-windows-publisher.yml
    with:
      candidate_sha: ${{ inputs.candidate_sha }}
      release_version: ${{ inputs.release_version }}
      mode: ${{ inputs.mode }}
      readiness_run_id: ${{ inputs.readiness_run_id }}
      decision_artifact_id: ${{ needs.verify-decision.outputs.decision_artifact_id }}
      requester: ${{ github.actor }}
    secrets: inherit
