# AstralDeep CI — feature 029 (T027).
# Authoritative job contract: specs/029-agents-adaptive-ui-ci/contracts/ci-pipeline.md
#
# Gates (FR-034..FR-038), each an independently-reported job:
#   lint · build · test · coverage-gate · smoke · secret-scan · publish (main only)
#
# CI-only tooling (Constitution V/XI — pipeline environment, NOT product deps):
#   ruff, pytest-cov/coverage, diff-cover, gitleaks (action).

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on PRs only; pushes to main always run to completion.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# Force every JavaScript action's runtime to Node 24, clearing the Node 20
# deprecation warnings across all jobs. checkout/setup-python are bumped to their
# Node 24 versions below; the remaining JS actions (upload-/download-artifact@v4,
# docker/build-push-action@v6, docker/setup-buildx-action@v3, gitleaks-action@v2)
# have no Node 24 release yet, so this env var is the only way to clear them.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── FR-034: repo-root lint (ruff.toml lives at the repo root, NOT in the image) ──
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: ruff check (repo root)
        run: ruff check .

  # ── Feature 044 (FR-023/SC-009): the Windows desktop client's pytest suite,
  #    headless (offscreen). Deliberately NOT path-filtered: it carries the
  #    protocol-coverage + vocabulary drift guards, which must be able to fail
  #    when a BACKEND change adds an unclassified frame/component type. ──
  windows-client:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Qt runtime libraries (offscreen platform)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon-x11-0 libdbus-1-3 libglib2.0-0
      - name: Install client requirements
        run: pip install -r windows-client/requirements.txt pytest
      - name: Desktop suite (incl. 044 drift guards)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest windows-client/tests -q

  # ── FR-035: the production image (incl. spaCy en_core_web_lg bake) still builds
  #    from a clean checkout. Exported as an artifact for test/smoke/publish. ──
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: astraldeep:ci
          outputs: type=docker,dest=/tmp/astraldeep.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: /tmp/astraldeep.tar
          retention-days: 1

  # ── FR-034: complete backend test suite inside the built image against a real
  #    Postgres, development posture. Both invocations per the contract; combined
  #    coverage.xml handed to coverage-gate. ──
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: astral
          POSTGRES_PASSWORD: astral_ci
          POSTGRES_DB: astraldeep
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U astral -d astraldeep"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: image
          path: /tmp
      - name: Load built image
        run: docker load -i /tmp/astraldeep.tar
      # The checkout's backend/ is mounted over the baked /app/backend so tests run
      # against THIS commit's source inside the production dependency environment.
      # --network host lets localhost:5432 reach the postgres service container.
      # pytest-cov/coverage are CI-only and installed ad hoc (not product deps).
      - name: Run both pytest invocations inside the image
        run: |
          docker run --rm --network host \
            -v "$PWD/backend:/app/backend" \
            -e ASTRAL_ENV=development \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_NAME=astraldeep \
            -e DB_USER=astral \
            -e DB_PASSWORD=astral_ci \
            -e AGENT_API_KEY=ci-test-agent-key \
            -e AUDIT_HMAC_SECRET=ci-test-hmac-secret \
            -e LOOP_GUARD_ENFORCE=1 \
            -e PERF_CONCURRENT_FLOOR_MS=5000 \
            -w /app/backend --entrypoint bash astraldeep:ci \
            -c "pip install pytest-cov 'coverage[toml]' && python -m pytest -q -m 'not integration' --cov=. --cov-report= && python -m pytest audit/tests llm_config/tests orchestrator/tests onboarding/tests personalization/tests scheduler/tests dreaming/tests verification/tests -q --cov=. --cov-append --cov-report= && python -m pytest tests/perf/concurrent_surfaces.py -q --cov=. --cov-append --cov-report=xml:coverage.xml"
      # coverage.xml lands in the mounted checkout at backend/coverage.xml.
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage.xml

  # ── Feature 055 (T047/SC-009): the same backend suite — including the drift
  #    guards it carries — with every 055 flag forced OFF, proving the off
  #    state restores pre-055 wire behavior byte-identically (safe rollback).
  #    Env names match backend/shared/feature_flags.py _read() keys; "0" is
  #    falsy there. FF_ARTIFACT_SHARING is default-off but pinned anyway so
  #    the job's posture is explicit and default-drift-proof. ──
  test-flags-off:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: astral
          POSTGRES_PASSWORD: astral_ci
          POSTGRES_DB: astraldeep
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U astral -d astraldeep"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: image
          path: /tmp
      - name: Load built image
        run: docker load -i /tmp/astraldeep.tar
      # Same invocations as the test job, minus the coverage plumbing (the
      # flags-on run owns the coverage artifact).
      - name: Backend suite with the 055 flags AND the 056 chaining flags off (SC-009 byte-equivalence)
        run: |
          docker run --rm --network host \
            -v "$PWD/backend:/app/backend" \
            -e ASTRAL_ENV=development \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_NAME=astraldeep \
            -e DB_USER=astral \
            -e DB_PASSWORD=astral_ci \
            -e AGENT_API_KEY=ci-test-agent-key \
            -e AUDIT_HMAC_SECRET=ci-test-hmac-secret \
            -e LOOP_GUARD_ENFORCE=1 \
            -e PERF_CONCURRENT_FLOOR_MS=5000 \
            -e FF_FIRST_TURN_CONTRACT=0 \
            -e FF_STREAM_ARTIFACTS=0 \
            -e FF_DESIGNER_ALL_DEVICES=0 \
            -e FF_COMPONENT_REFINE=0 \
            -e FF_ARTIFACT_EXPORT=0 \
            -e FF_ARTIFACT_SHARING=0 \
            -e FF_BG_CONTINUITY=0 \
            -e FF_RECURSIVE_DELEGATION=0 \
            -e FF_SCHEDULER_EXECUTION=0 \
            -w /app/backend --entrypoint bash astraldeep:ci \
            -c "python -m pytest -q -m 'not integration' && python -m pytest audit/tests llm_config/tests orchestrator/tests onboarding/tests personalization/tests scheduler/tests dreaming/tests verification/tests -q && python -m pytest tests/perf/concurrent_surfaces.py -q"

  # ── FR-034: changed-code coverage ≥ 90% vs origin/main (Constitution III). ──
  coverage-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install diff-cover
        run: pip install diff-cover
      - uses: actions/download-artifact@v4
        with:
          name: coverage
          path: backend
      # Tests ran at /app/backend inside the image, so coverage.xml's <source>
      # says /app/backend; rewrite it to backend so diff-cover maps measured
      # files onto the git diff's repo-root-relative paths.
      - name: Map container paths to repo paths
        run: sed -i 's|/app/backend|backend|g' backend/coverage.xml
      - name: Ensure origin/main exists locally
        run: |
          git rev-parse --verify --quiet origin/main >/dev/null \
            || git fetch origin main:refs/remotes/origin/main
      # NOTE: diff-cover exits 0 when the diff vs origin/main contains no
      # measurable Python lines — that vacuous pass is intentional (FR-034:
      # the gate measures CHANGED code; docs/CSS/YAML-only diffs pass).
      - name: Enforce 90% on changed Python lines
        run: diff-cover backend/coverage.xml --compare-branch origin/main --fail-under 90

  # ── FR-036: boot-smoke the built image. (1) dev posture answers /healthz +
  #    /readyz with a real DB; (2) production posture with placeholder/missing
  #    secrets exits EXACTLY 78 (EX_CONFIG — the fail-closed boot gate). ──
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: astral
          POSTGRES_PASSWORD: astral_ci
          POSTGRES_DB: astraldeep
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U astral -d astraldeep"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image
          path: /tmp
      - name: Load built image
        run: docker load -i /tmp/astraldeep.tar
      # Feature 054 (FR-004): the shipped-artifact credential check. The
      # image filesystem must carry NO .env and NO LLM credential material —
      # the product ships with zero LLM access (native binaries are built
      # from this same scanned tree and contain no credential inputs).
      - name: Shipped-artifact check — image carries no LLM credential
        run: |
          set -e
          docker run --rm --entrypoint sh astraldeep:ci -c '
            fail=0
            # (1) The real deployment risk: no .env baked into an image layer.
            if [ -f /app/.env ] || [ -f /app/backend/.env ]; then
              echo "::error::.env file baked into the image"; fail=1
            fi
            # (2) Key-shaped strings in RUNTIME code only (sk-/gsk_/xai-/AIza +
            #     20 chars). Test fixtures, the eval benchmark corpus, and docs
            #     legitimately carry fake example keys, so they are excluded;
            #     gitleaks scans the full repo/history separately. Offenders
            #     are printed so a real hit is actionable.
            hits=$(grep -rInE "\b(sk-|gsk_|xai-|AIza)[A-Za-z0-9_-]{20,}\b" /app \
                     --include="*.py" --include="*.json" \
                     --exclude-dir=tests --exclude-dir=security_benchmark \
                     --exclude-dir=__pycache__ --exclude-dir=knowledge_packs \
                     --exclude="test_*.py" --exclude="conftest.py" 2>/dev/null || true)
            if [ -n "$hits" ]; then
              echo "::error::key-shaped strings found in runtime code:"; echo "$hits"; fail=1
            fi
            exit $fail
          '
          echo "image is credential-free (FR-004 shipped-artifact check)"
      # Default CMD = start-docker.sh: waits for Postgres (the service is up),
      # then exec start.py which boots the orchestrator on :8001.
      - name: Dev-posture boot answers /healthz and /readyz
        run: |
          docker run -d --name astraldeep-smoke --network host \
            -e ASTRAL_ENV=development \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_NAME=astraldeep \
            -e DB_USER=astral \
            -e DB_PASSWORD=astral_ci \
            -e AGENT_API_KEY=ci-test-agent-key \
            -e AUDIT_HMAC_SECRET=ci-test-hmac-secret \
            astraldeep:ci
          ok=""
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null http://localhost:8001/healthz \
               && curl -fsS -o /dev/null http://localhost:8001/readyz; then
              ok=1
              break
            fi
            sleep 2
          done
          if [ -z "$ok" ]; then
            echo "::error::/healthz + /readyz did not both answer 200 within 120s"
            docker logs astraldeep-smoke
            exit 1
          fi
          echo "liveness + readiness OK (dev posture, real DB)"
      - name: Cleanup dev-posture container
        if: always()
        run: docker rm -f astraldeep-smoke || true
      # Fail-closed proof. assert_production_posture (orchestrator/session_store.py)
      # raises SystemExit(78) from Orchestrator.start when ASTRAL_ENV != development
      # and mock auth is on / secrets are placeholders. The image's default CMD
      # (start-docker.sh -> start.py) SUPERVISES the orchestrator as a child and
      # exits 0 when it dies, swallowing the gate's code — so this runs the
      # orchestrator process directly, exactly as start.py spawns it (cwd
      # /app/backend; orchestrator.py self-inserts its parent dir on sys.path).
      # DB env points at the live service so boot reaches the posture gate.
      # `timeout 300` turns a hung boot into a failure (124) instead of a block.
      - name: Fail-closed proof — production posture must exit 78
        run: |
          set +e
          timeout 300 docker run --rm --network host \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_NAME=astraldeep \
            -e DB_USER=astral \
            -e DB_PASSWORD=astral_ci \
            -e USE_MOCK_AUTH=true \
            -e AUDIT_HMAC_SECRET=change-me \
            -w /app/backend --entrypoint python \
            astraldeep:ci orchestrator/orchestrator.py
          code=$?
          set -e
          if [ "$code" -ne 78 ]; then
            echo "::error::expected exit 78 (EX_CONFIG fail-closed boot gate), got $code"
            exit 1
          fi
          echo "fail-closed boot gate refused to serve with exit 78, as documented"

  # ── FR-037: committed-credential scan over full history. Allowlist for the
  #    repo's intentional dev/test placeholders lives in .gitleaks.toml
  #    (auto-discovered at the repo root; pinned explicitly below). ──
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
          # PR comments would need pull-requests: write; keep permissions minimal.
          GITLEAKS_ENABLE_COMMENTS: "false"
          # Only required if the repo is organization-owned; no-op when unset.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── FR-038: publish the EXACT verified image to GHCR on main pushes only.
  #    Needs every verification gate, so a publish failure is distinguishable
  #    from a verification failure (the gates stay green/visible). ──
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, build, test, test-flags-off, coverage-gate, smoke, secret-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image
          path: /tmp
      - name: Load built image
        run: docker load -i /tmp/astraldeep.tar
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # GHCR requires a lowercase repository path; ${{ github.repository }} may
      # carry uppercase (e.g. AstralDeep/...), so lowercase it in the shell.
      - name: Tag and push (immutable sha tag + moving latest)
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker tag astraldeep:ci "ghcr.io/$REPO_LC:sha-${{ github.sha }}"
          docker tag astraldeep:ci "ghcr.io/$REPO_LC:latest"
          docker push "ghcr.io/$REPO_LC:sha-${{ github.sha }}"
          docker push "ghcr.io/$REPO_LC:latest"
