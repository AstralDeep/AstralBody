# Feature 039 — build, sign (keyless sigstore), and release the Windows desktop
# client as a GitHub Release. Fires only on version tags (v*) so it does not
# gate PRs or slow the main CI. Separate from ci.yml by design.
#
# Produces three assets per release:
#   AstralDeep.exe   — the PyInstaller-built native client
#   SHA256SUMS       — the SHA-256 of the exe (the client's primary integrity check)
#   cosign.bundle    — the sigstore bundle (keyless, signed with the workflow's
#                      GitHub OIDC identity; verified client-side against the
#                      AstralDeep/AstralDeep workflow identity)
#
# No long-lived signing secret: sigstore keyless signing uses the job's OIDC
# token (permissions.id-token: write). The client verifies both the hash and
# the sigstore signature before it ever runs a downloaded binary.

name: Release Windows client

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create the GitHub Release + upload assets
  id-token: write   # sigstore keyless signing (OIDC)

jobs:
  build-sign-release:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: windows-client/requirements-release.lock.txt

      # Guard: the pushed tag must equal v<astral_client.__version__>. Without
      # this, a tag pushed against a stale version constant builds and signs
      # cleanly but ships an exe whose launch integrity check permanently
      # reports "A verified update is available" (it compares the baked
      # __version__ to the latest release tag). Tag-push runs only —
      # workflow_dispatch runs from a branch ref and is exempt.
      - name: Tag matches astral_client.__version__
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: windows-client
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          python - <<'EOF'
          import os, sys
          import astral_client
          tag = os.environ["TAG"]
          want = f"v{astral_client.__version__}"
          if tag != want:
              sys.exit(f"Tag {tag!r} != v<__version__> ({want!r}) — bump "
                       "windows-client/astral_client/__init__.py before tagging.")
          print(f"tag {tag} matches __version__")
          EOF

      - name: Install hash-locked build and runtime dependencies
        run: python -m pip install --require-hashes -r windows-client/requirements-release.lock.txt

      - name: Build the exe (PyInstaller)
        working-directory: windows-client
        run: pyinstaller --noconfirm AstralDeep.spec

      - name: Create SHA256SUMS
        working-directory: windows-client/dist
        shell: bash
        run: |
          sha256sum AstralDeep.exe > SHA256SUMS
          cat SHA256SUMS

      - name: Keyless sign with sigstore (GitHub OIDC)
        working-directory: windows-client/dist
        shell: bash
        # Keyless signing uses the job's ambient GitHub OIDC credential
        # (permissions.id-token: write) — no --identity/--oidc-issuer flags,
        # which conflict with the ambient token. Fulcio issues a cert whose
        # SAN is the token's `sub`:
        #   https://github.com/AstralDeep/AstralDeep/.github/workflows/release-windows.yml@refs/tags/<tag>
        # The client verifier rebuilds that exact string from the release tag.
        run: |
          sigstore sign AstralDeep.exe --bundle cosign.bundle

      - name: Verify the signature (self-check)
        working-directory: windows-client/dist
        shell: bash
        env:
          SIGSTORE_IDENTITY: "https://github.com/AstralDeep/AstralDeep/.github/workflows/release-windows.yml@refs/tags/${{ github.ref_name }}"
        # sigstore 3.x merged verify-github into `verify` (same --cert-identity
        # + --cert-oidc-issuer flags). The client verifier uses the equivalent
        # sigstore-python Identity policy with the same exact-match string.
        run: |
          sigstore verify identity AstralDeep.exe --bundle cosign.bundle \
            --cert-identity "$SIGSTORE_IDENTITY" \
            --cert-oidc-issuer https://token.actions.githubusercontent.com

      - name: Create / update the GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            windows-client/dist/AstralDeep.exe
            windows-client/dist/SHA256SUMS
            windows-client/dist/cosign.bundle
          generate_release_notes: true
          fail_on_unmatched_files: true
