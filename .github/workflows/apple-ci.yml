# Feature 060 — non-waivable Apple lint, coverage, continuity, and first-login gates.
name: apple-ci

on:
  push:
    branches: [main]
    paths:
      - "apple-clients/**"
      - "backend/shared/ui_protocol.json"
      - ".github/workflows/apple-ci.yml"
  pull_request:
    paths:
      - "apple-clients/**"
      - "backend/shared/ui_protocol.json"
      - ".github/workflows/apple-ci.yml"

permissions:
  contents: read

env:
  XCODE_VERSION: "26.6"
  XCODE_BUILD: "17F113"
  IOS_RUNTIME: "26.5"
  WATCHOS_RUNTIME: "26.5"
  APP_PROJECT: apple-clients/AstralApp/AstralApp.xcodeproj
  COVERAGE_ROOT: build/060/coverage

jobs:
  swift-lint:
    name: Required · strict recursive swift-format
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Check out candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Select exact Xcode
        shell: bash
        run: |
          set -euo pipefail
          selected=""
          for candidate in /Applications/Xcode_26.6.app /Applications/Xcode_26.6*.app /Applications/Xcode.app; do
            [[ -d "$candidate" ]] || continue
            if [[ "$("$candidate/Contents/Developer/usr/bin/xcodebuild" -version | sed -n '1p')" == "Xcode ${XCODE_VERSION}" ]] && \
               [[ "$("$candidate/Contents/Developer/usr/bin/xcodebuild" -version | sed -n '2p')" == "Build version ${XCODE_BUILD}" ]]; then
              selected="$candidate"
              break
            fi
          done
          [[ -n "$selected" ]] || { echo "Xcode ${XCODE_VERSION} (${XCODE_BUILD}) is required" >&2; exit 1; }
          sudo xcode-select --switch "$selected/Contents/Developer"
          [[ "$(xcodebuild -version | sed -n '1p')" == "Xcode ${XCODE_VERSION}" ]]
          [[ "$(xcodebuild -version | sed -n '2p')" == "Build version ${XCODE_BUILD}" ]]
      - name: Lint every maintained Swift source
        run: >-
          xcrun swift-format lint --strict --recursive
          --configuration apple-clients/.swift-format
          apple-clients/AstralCore apple-clients/AstralApp apple-clients/AstralWatch

  core-tests:
    name: Required · AstralCore tests and drift guard
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Check out candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Select exact Xcode
        shell: bash
        run: |
          set -euo pipefail
          selected=""
          for candidate in /Applications/Xcode_26.6.app /Applications/Xcode_26.6*.app /Applications/Xcode.app; do
            [[ -d "$candidate" ]] || continue
            if [[ "$("$candidate/Contents/Developer/usr/bin/xcodebuild" -version | sed -n '1p')" == "Xcode ${XCODE_VERSION}" ]] && \
               [[ "$("$candidate/Contents/Developer/usr/bin/xcodebuild" -version | sed -n '2p')" == "Build version ${XCODE_BUILD}" ]]; then
              selected="$candidate"
              break
            fi
          done
          [[ -n "$selected" ]] || { echo "Xcode ${XCODE_VERSION} (${XCODE_BUILD}) is required" >&2; exit 1; }
          sudo xcode-select --switch "$selected/Contents/Developer"
          [[ "$(xcodebuild -version | sed -n '1p')" == "Xcode ${XCODE_VERSION}" ]]
          [[ "$(xcodebuild -version | sed -n '2p')" == "Build version ${XCODE_BUILD}" ]]
      - name: Validate App Store icon assets
        run: python3 apple-clients/Scripts/generate_app_icons.py --check
      - name: Run AstralCore with coverage
        run: swift test --package-path apple-clients/AstralCore --enable-code-coverage
      - name: Stage SwiftPM coverage data
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${COVERAGE_ROOT}/astralcore-codecov"
          # `.build/debug` is a symlink into `.build/<triple>/debug`, which
          # upload-artifact will not traverse; resolve the real bin path and
          # copy the codecov payload (profdata + test binary) to a flat dir.
          bin="$(swift build --package-path apple-clients/AstralCore --show-bin-path)"
          if [[ -d "$bin/codecov" ]]; then
            cp -R "$bin/codecov/." "${COVERAGE_ROOT}/astralcore-codecov/"
          fi
          find "${COVERAGE_ROOT}/astralcore-codecov" -type f | head
      - name: Upload SwiftPM coverage data
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: astralcore-swiftpm-coverage
          path: ${{ env.COVERAGE_ROOT }}/astralcore-codecov/**
          if-no-files-found: error
          retention-days: 14

  app-unit-tests:
    name: Required · ${{ matrix.name }} app continuity/unit coverage
    runs-on: macos-26
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS 26.5
            slug: ios
            destination: "platform=iOS Simulator,name=iPhone 17 Pro,OS=26.5"
          - name: macOS
            slug: macos
            destination: "platform=macOS"
    steps:
      - name: Check out candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Select exact Xcode
        shell: bash
        run: |
          set -euo pipefail
          selected=""
          for candidate in /Applications/Xcode_26.6.app /Applications/Xcode_26.6*.app /Applications/Xcode.app; do
            [[ -d "$candidate" ]] || continue
            if [[ "$("$candidate/Contents/Developer/usr/bin/xcodebuild" -version | sed -n '1p')" == "Xcode ${XCODE_VERSION}" ]] && \
               [[ "$("$candidate/Contents/Developer/usr/bin/xcodebuild" -version | sed -n '2p')" == "Build version ${XCODE_BUILD}" ]]; then
              selected="$candidate"
              break
            fi
          done
          [[ -n "$selected" ]] || { echo "Xcode ${XCODE_VERSION} (${XCODE_BUILD}) is required" >&2; exit 1; }
          sudo xcode-select --switch "$selected/Contents/Developer"
          [[ "$(xcodebuild -version | sed -n '1p')" == "Xcode ${XCODE_VERSION}" ]]
          [[ "$(xcodebuild -version | sed -n '2p')" == "Build version ${XCODE_BUILD}" ]]
      - name: Require the supported iOS runtime
        if: matrix.slug == 'ios'
        shell: bash
        run: |
          set -euo pipefail
          xcrun simctl list runtimes available | grep -F "iOS ${IOS_RUNTIME}"
          xcrun simctl list devicetypes | grep -F "iPhone 17 Pro"
      - name: Run app unit and continuity tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${COVERAGE_ROOT}"
          result="${COVERAGE_ROOT}/AstralApp-${{ matrix.slug }}-unit.xcresult"
          report="${COVERAGE_ROOT}/apple-${{ matrix.slug }}-unit-xccov.json"
          rm -rf "$result"
          set +e
          xcodebuild \
            -project "${APP_PROJECT}" \
            -scheme AstralApp \
            -destination '${{ matrix.destination }}' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -enableCodeCoverage YES \
            -resultBundlePath "$result" \
            -only-testing:AstralAppTests \
            test
          status=$?
          set -e
          if [[ -d "$result" ]]; then
            xcrun xccov view --archive --json "$result" > "$report"
          fi
          exit "$status"
      - name: Upload mapped app unit coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: apple-${{ matrix.slug }}-unit-coverage
          path: |
            build/060/coverage/AstralApp-${{ matrix.slug }}-unit.xcresult
            build/060/coverage/apple-${{ matrix.slug }}-unit-xccov.json
          if-no-files-found: error
          retention-days: 14

  first-login-ui:
    name: Required · ${{ matrix.name }} first-login UI
    runs-on: macos-26
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS 26.5
            slug: ios
            destination: "platform=iOS Simulator,name=iPhone 17 Pro,OS=26.5"
          - name: macOS
            slug: macos
            destination: "platform=macOS"
    steps:
      - name: Check out candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Select exact Xcode
        shell: bash
        run: |
          set -euo pipefail
          selected=""
          for candidate in /Applications/Xcode_26.6.app /Applications/Xcode_26.6*.app /Applications/Xcode.app; do
            [[ -d "$candidate" ]] || continue
            if [[ "$("$candidate/Contents/Developer/usr/bin/xcodebuild" -version | sed -n '1p')" == "Xcode ${XCODE_VERSION}" ]] && \
               [[ "$("$candidate/Contents/Developer/usr/bin/xcodebuild" -version | sed -n '2p')" == "Build version ${XCODE_BUILD}" ]]; then
              selected="$candidate"
              break
            fi
          done
          [[ -n "$selected" ]] || { echo "Xcode ${XCODE_VERSION} (${XCODE_BUILD}) is required" >&2; exit 1; }
          sudo xcode-select --switch "$selected/Contents/Developer"
          [[ "$(xcodebuild -version | sed -n '1p')" == "Xcode ${XCODE_VERSION}" ]]
          [[ "$(xcodebuild -version | sed -n '2p')" == "Build version ${XCODE_BUILD}" ]]
      - name: Require the supported iOS runtime
        if: matrix.slug == 'ios'
        shell: bash
        run: |
          set -euo pipefail
          xcrun simctl list runtimes available | grep -F "iOS ${IOS_RUNTIME}"
          xcrun simctl list devicetypes | grep -F "iPhone 17 Pro"
      - name: Run deterministic first-login UI tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${COVERAGE_ROOT}"
          result="${COVERAGE_ROOT}/AstralApp-${{ matrix.slug }}-first-login.xcresult"
          report="${COVERAGE_ROOT}/apple-${{ matrix.slug }}-first-login-xccov.json"
          rm -rf "$result"
          set +e
          xcodebuild \
            -project "${APP_PROJECT}" \
            -scheme AstralApp \
            -destination '${{ matrix.destination }}' \
            -configuration Debug \
            -enableCodeCoverage YES \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 60 \
            -maximum-test-execution-time-allowance 120 \
            -resultBundlePath "$result" \
            -only-testing:AstralAppUITests/LLMFirstLoginUITests \
            test
          status=$?
          set -e
          if [[ -d "$result" ]]; then
            xcrun xccov view --archive --json "$result" > "$report"
          fi
          exit "$status"
      - name: Upload mapped first-login coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: apple-${{ matrix.slug }}-first-login-coverage
          path: |
            build/060/coverage/AstralApp-${{ matrix.slug }}-first-login.xcresult
            build/060/coverage/apple-${{ matrix.slug }}-first-login-xccov.json
          if-no-files-found: error
          retention-days: 14

  watch-continuity:
    name: Required · watchOS 26.5 continuity coverage
    runs-on: macos-26
    timeout-minutes: 35
    steps:
      - name: Check out candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Select exact Xcode
        shell: bash
        run: |
          set -euo pipefail
          selected=""
          for candidate in /Applications/Xcode_26.6.app /Applications/Xcode_26.6*.app /Applications/Xcode.app; do
            [[ -d "$candidate" ]] || continue
            if [[ "$("$candidate/Contents/Developer/usr/bin/xcodebuild" -version | sed -n '1p')" == "Xcode ${XCODE_VERSION}" ]] && \
               [[ "$("$candidate/Contents/Developer/usr/bin/xcodebuild" -version | sed -n '2p')" == "Build version ${XCODE_BUILD}" ]]; then
              selected="$candidate"
              break
            fi
          done
          [[ -n "$selected" ]] || { echo "Xcode ${XCODE_VERSION} (${XCODE_BUILD}) is required" >&2; exit 1; }
          sudo xcode-select --switch "$selected/Contents/Developer"
          [[ "$(xcodebuild -version | sed -n '1p')" == "Xcode ${XCODE_VERSION}" ]]
          [[ "$(xcodebuild -version | sed -n '2p')" == "Build version ${XCODE_BUILD}" ]]
      - name: Provision a dedicated watchOS simulator
        id: watch_sim
        shell: bash
        run: |
          set -euo pipefail
          xcrun simctl list runtimes available | grep -F "watchOS ${WATCHOS_RUNTIME}"
          xcrun simctl list devicetypes | grep -F "Apple Watch Series 11 (46mm)"
          # Hosted macos-26 images may ship zero, one, or several pre-created
          # "Apple Watch Series 11 (46mm)" devices, so a name+OS destination is
          # ambiguous. Create one dedicated device and target it by exact UDID.
          runtime_id="$(xcrun simctl list runtimes available -j \
            | python3 -c "import json,sys,os; rt=os.environ['WATCHOS_RUNTIME']; print(next(r['identifier'] for r in json.load(sys.stdin)['runtimes'] if r.get('isAvailable') and r.get('version')==rt))")"
          [[ -n "$runtime_id" ]] || { echo "watchOS ${WATCHOS_RUNTIME} runtime not found" >&2; exit 1; }
          xcrun simctl delete "astral-watch-060" 2>/dev/null || true
          udid="$(xcrun simctl create "astral-watch-060" "Apple Watch Series 11 (46mm)" "$runtime_id")"
          echo "udid=$udid" >> "$GITHUB_OUTPUT"
      - name: Run Watch continuity target with coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${COVERAGE_ROOT}"
          result="${COVERAGE_ROOT}/AstralWatch.xcresult"
          report="${COVERAGE_ROOT}/apple-watchos-xccov.json"
          rm -rf "$result"
          set +e
          xcodebuild \
            -project "${APP_PROJECT}" \
            -scheme AstralWatch \
            -destination "platform=watchOS Simulator,id=${{ steps.watch_sim.outputs.udid }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -enableCodeCoverage YES \
            -resultBundlePath "$result" \
            -only-testing:AstralWatchTests \
            test
          status=$?
          set -e
          if [[ -d "$result" ]]; then
            xcrun xccov view --archive --json "$result" > "$report"
          fi
          exit "$status"
      - name: Upload mapped Watch coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: apple-watchos-continuity-coverage
          path: |
            build/060/coverage/AstralWatch.xcresult
            build/060/coverage/apple-watchos-xccov.json
          if-no-files-found: error
          retention-days: 14

  apple-required:
    name: Required · Apple aggregate
    if: always()
    runs-on: macos-26
    timeout-minutes: 5
    needs:
      - swift-lint
      - core-tests
      - app-unit-tests
      - first-login-ui
      - watch-continuity
    steps:
      - name: Enforce every non-waivable Apple result
        shell: bash
        run: |
          [[ '${{ needs.swift-lint.result }}' == 'success' ]]
          [[ '${{ needs.core-tests.result }}' == 'success' ]]
          [[ '${{ needs.app-unit-tests.result }}' == 'success' ]]
          [[ '${{ needs.first-login-ui.result }}' == 'success' ]]
          [[ '${{ needs.watch-continuity.result }}' == 'success' ]]
