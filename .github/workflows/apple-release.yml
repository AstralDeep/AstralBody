# Feature 053 — build, sign, upload and submit the Apple clients to the App Store.
#
# Produces TWO archives and uploads both into the SINGLE Universal Purchase App
# Store Connect record they share (bundle id com.personalailabs.astraldeep):
#   * iOS   — carries the embedded watchOS app (Embed Watch Content phase)
#   * macOS — Mac App Store (.pkg)
#
# There is deliberately NO notarytool step. Developer notarization is the
# Developer-ID / outside-the-store path. App Store builds (including Mac App
# Store) are processed and signed-checked by Apple after upload.
#
# TAG NAMESPACE: `apple-v*`, NOT `v-apple-*`. release-windows.yml triggers on
# `v*`, and a GitHub Actions `*` matches any character except `/` — so a
# `v-apple-1.0.0` tag WOULD also match `v*` and double-fire the Windows release
# (whose tag-vs-__version__ guard then fails the run). Only a namespace that does
# not begin with `v` is provably disjoint. Do not "fix" this back to `v-apple-*`.
#
# Separate from ci.yml by design: the six backend gates are untouched.

name: Release Apple clients

# Triggers:
#   * apple-v* tag push       — versioned release (guard asserts tag==MARKETING_VERSION)
#   * push to main            — auto-release ONLY when apple-clients/** changed (the
#                               `gate` job below decides); build number = run number,
#                               version = the project's MARKETING_VERSION
#   * workflow_dispatch       — manual release from any ref
# A `paths:` filter is deliberately NOT used: on GitHub it interacts unreliably with
# tag pushes (they can be silently skipped), so the apple-clients change check lives
# in the `gate` job instead — the tag/dispatch paths are never path-filtered.
on:
  push:
    branches: ["main"]
    tags: ["apple-v*"]
  workflow_dispatch:

permissions:
  contents: read # checkout only; the App Store is the channel, not a GH Release

env:
  PROJECT: apple-clients/AstralApp/AstralApp.xcodeproj
  SCHEME: AstralApp

jobs:
  # Cheap Linux gate: a tag push or manual dispatch always releases; a push to
  # main releases only when apple-clients/** changed on that push (so ordinary
  # backend merges don't upload a redundant TestFlight build).
  gate:
    name: Decide whether to release
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.decide.outputs.release }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 2
      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
             || [ "${{ github.ref_type }}" = "tag" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "release: event=${{ github.event_name }} ref=${{ github.ref }}"
          elif git diff --name-only HEAD^ HEAD | grep -q '^apple-clients/'; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "release: apple-clients/** changed on this main push"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "skip: no apple-clients/** changes on this main push"
          fi

  release:
    name: Archive, sign, upload and submit
    needs: gate
    if: needs.gate.outputs.release == 'true'
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Select the latest stable Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      # Fail before any signing step if the operator has not provisioned the
      # secrets. Names only ever reach the log — never values.
      - name: Require signing material
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DISTRIBUTION_CERT_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          missing=()
          for k in APPLE_TEAM_ID APPLE_DISTRIBUTION_CERT_P12_BASE64 APPLE_CERT_PASSWORD \
                   APPLE_PROVISION_PROFILE_BASE64 ASC_KEY_ID ASC_ISSUER_ID ASC_KEY_P8_BASE64; do
            [ -n "${!k}" ] || missing+=("$k")
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::missing signing material: ${missing[*]}"
            echo "No archive is produced without it. Configure these repository secrets."
            exit 1
          fi
          echo "all required secrets are present"

      # The pushed tag must be apple-v<MARKETING_VERSION>. Without this a stale
      # version constant ships under a tag that claims otherwise. Tag pushes only:
      # workflow_dispatch runs from a branch ref and has no tag to compare.
      - name: Tag matches MARKETING_VERSION
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version=$(xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
                      -configuration Release -showBuildSettings 2>/dev/null \
                    | awk '/ MARKETING_VERSION /{print $3; exit}')
          want="apple-v${version}"
          if [ "$TAG" != "$want" ]; then
            echo "::error::tag '$TAG' != '$want' — bump MARKETING_VERSION before tagging."
            exit 1
          fi
          echo "tag $TAG matches MARKETING_VERSION $version"

      - name: Import signing material into an ephemeral keychain
        env:
          APPLE_DISTRIBUTION_CERT_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}
          APPLE_INSTALLER_CERT_P12_BASE64: ${{ secrets.APPLE_INSTALLER_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERT_PASSWORD }}
          APPLE_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/astral-signing.keychain-db"
          PASSWORD="$(uuidgen)"
          security create-keychain -p "$PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$PASSWORD" "$KEYCHAIN"

          echo "$APPLE_DISTRIBUTION_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          rm -f "$RUNNER_TEMP/cert.p12"

          # A Mac App Store .pkg is signed by a SECOND identity ("3rd Party Mac
          # Developer Installer"). It may travel inside the same .p12 as the
          # Apple Distribution identity; if it does not, supply it separately.
          if [ -n "$APPLE_INSTALLER_CERT_P12_BASE64" ]; then
            echo "$APPLE_INSTALLER_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/installer.p12"
            security import "$RUNNER_TEMP/installer.p12" -k "$KEYCHAIN" \
              -P "${APPLE_INSTALLER_CERT_PASSWORD:-$APPLE_CERT_PASSWORD}" \
              -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
            rm -f "$RUNNER_TEMP/installer.p12"
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

      # Fail in seconds with an actionable message rather than 20 minutes into an
      # archive. A .p12 only yields a usable identity if it carries the PRIVATE
      # KEY; a bare .cer imports "successfully" and then signs nothing.
      - name: Verify the imported identities
        run: |
          echo "identities in the ephemeral keychain:"
          security find-identity -v -p codesigning "$RUNNER_TEMP/astral-signing.keychain-db" || true

          have_app=$(security find-identity -v -p codesigning "$RUNNER_TEMP/astral-signing.keychain-db" \
                       | grep -c "Apple Distribution" || true)
          have_pkg=$(security find-identity -v "$RUNNER_TEMP/astral-signing.keychain-db" \
                       | grep -c "3rd Party Mac Developer Installer" || true)

          fail=0
          if [ "$have_app" -eq 0 ]; then
            echo "::error::No 'Apple Distribution' identity after import. The .p12 in"
            echo "::error::APPLE_DISTRIBUTION_CERT_P12_BASE64 must contain the certificate AND its"
            echo "::error::private key (export the identity from Keychain Access as .p12 -- a bare"
            echo "::error::.cer from the developer portal will not work). A 'Developer ID Application'"
            echo "::error::certificate is for distribution OUTSIDE the App Store and cannot be used here."
            fail=1
          fi
          if [ "$have_pkg" -eq 0 ]; then
            echo "::error::No '3rd Party Mac Developer Installer' identity. The Mac App Store .pkg is"
            echo "::error::signed by this SECOND certificate. Either include it in the same .p12 as the"
            echo "::error::Apple Distribution identity, or add secrets APPLE_INSTALLER_CERT_P12_BASE64"
            echo "::error::(and APPLE_INSTALLER_CERT_PASSWORD if its password differs)."
            fail=1
          fi
          [ "$fail" -eq 0 ] || exit 1
          echo "both signing identities present"

      # A .mobileprovision is per bundle-id AND platform, so three profiles are
      # needed: iOS + macOS (both com.personalailabs.astraldeep, different
      # platforms) and watchOS (…​.watch). Accept whatever container the operator
      # produced -- tar, zip, or a single raw profile -- rather than demanding one.
      - name: Install provisioning profiles
        env:
          APPLE_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
        run: |
          IOS_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          MAC_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          SRC="$RUNNER_TEMP/profiles"
          mkdir -p "$SRC" "$IOS_DIR" "$MAC_DIR"

          echo "$APPLE_PROVISION_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/profiles.blob"
          kind=$(file -b --mime-type "$RUNNER_TEMP/profiles.blob")
          echo "provision blob type: $kind"
          case "$kind" in
            application/x-tar|application/gzip|application/x-gzip)
              tar -xf "$RUNNER_TEMP/profiles.blob" -C "$SRC" ;;
            application/zip)
              unzip -qq "$RUNNER_TEMP/profiles.blob" -d "$SRC" ;;
            *)
              # A single profile is CMS (DER) or XML; keep it as-is and let the
              # count check below explain that three are required.
              cp "$RUNNER_TEMP/profiles.blob" "$SRC/profile-1.mobileprovision" ;;
          esac
          rm -f "$RUNNER_TEMP/profiles.blob"

          count=0
          while IFS= read -r prof; do
            cp "$prof" "$IOS_DIR/"; cp "$prof" "$MAC_DIR/"
            name=$(security cms -D -i "$prof" 2>/dev/null | plutil -extract Name raw - 2>/dev/null || echo "?")
            appid=$(security cms -D -i "$prof" 2>/dev/null | plutil -extract Entitlements.application-identifier raw - 2>/dev/null \
                    || security cms -D -i "$prof" 2>/dev/null | plutil -extract 'Entitlements.com\.apple\.application-identifier' raw - 2>/dev/null \
                    || echo "?")
            plat=$(security cms -D -i "$prof" 2>/dev/null | plutil -extract Platform.0 raw - 2>/dev/null || echo "?")
            echo "  installed: $name  [$appid, platform=$plat]"
            count=$((count + 1))
          done < <(find "$SRC" \( -name '*.mobileprovision' -o -name '*.provisionprofile' \))

          if [ "$count" -lt 3 ]; then
            echo "::error::found $count provisioning profile(s); three are required --"
            echo "::error::iOS App Store + macOS App Store (both com.personalailabs.astraldeep)"
            echo "::error::and watchOS App Store (com.personalailabs.astraldeep.watch)."
            echo "::error::Pack all three into one tar or zip and base64 that:"
            echo "::error::  tar -cf profiles.tar *.mobileprovision *.provisionprofile"
            echo "::error::  base64 -i profiles.tar | pbcopy"
            exit 1
          fi
          echo "installed $count profile(s)"

      # App Store Connect rejects duplicate build numbers. The CI run number is
      # monotonic and collision-free. Passed straight to xcodebuild rather than
      # rewritten into the project with agvtool: both Info.plists already read
      # $(CURRENT_PROJECT_VERSION), so nothing in the tree needs mutating.
      - name: Render export options from secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROFILE_IOS: ${{ secrets.APPLE_PROFILE_IOS }}
          APPLE_PROFILE_MACOS: ${{ secrets.APPLE_PROFILE_MACOS }}
          APPLE_PROFILE_WATCH: ${{ secrets.APPLE_PROFILE_WATCH }}
        run: |
          # `envsubst` (gettext) is not guaranteed on a macOS runner; python3 is.
          for f in ios macos; do
            python3 apple-clients/Scripts/render_export_options.py \
              "apple-clients/ExportOptions-$f.plist" "$RUNNER_TEMP/ExportOptions-$f.plist"
            plutil -lint "$RUNNER_TEMP/ExportOptions-$f.plist"
          done

      # The iOS archive carries the embedded watch app; the macOS archive must not.
      # Manual signing needs a profile per target AND per platform. A value passed
      # on the command line hits every target, so the names go in as variables and
      # project.pbxproj maps each target/sdk to the right one. The iOS archive also
      # builds the embedded watch app, hence both names here.
      - name: Archive iOS (with the embedded watch app)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROFILE_IOS: ${{ secrets.APPLE_PROFILE_IOS }}
          APPLE_PROFILE_WATCH: ${{ secrets.APPLE_PROFILE_WATCH }}
        run: |
          xcodebuild archive -project "$PROJECT" -scheme "$SCHEME" \
            -destination 'generic/platform=iOS' -configuration Release \
            -archivePath "$RUNNER_TEMP/AstralDeep-ios.xcarchive" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            ASTRAL_DEVELOPMENT_TEAM="$APPLE_TEAM_ID" CODE_SIGN_STYLE=Manual \
            ASTRAL_PROFILE_IOS="$APPLE_PROFILE_IOS" ASTRAL_PROFILE_WATCH="$APPLE_PROFILE_WATCH"
          test -d "$RUNNER_TEMP/AstralDeep-ios.xcarchive/Products/Applications/AstralDeep.app/Watch/AstralWatch.app" \
            || { echo "::error::iOS archive is missing the embedded watch app"; exit 1; }

      - name: Archive macOS (Mac App Store)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROFILE_MACOS: ${{ secrets.APPLE_PROFILE_MACOS }}
        run: |
          xcodebuild archive -project "$PROJECT" -scheme "$SCHEME" \
            -destination 'generic/platform=macOS' -configuration Release \
            -archivePath "$RUNNER_TEMP/AstralDeep-macos.xcarchive" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            ASTRAL_DEVELOPMENT_TEAM="$APPLE_TEAM_ID" CODE_SIGN_STYLE=Manual \
            ASTRAL_PROFILE_MACOS="$APPLE_PROFILE_MACOS"
          # A macOS app must not contain a watchOS app. The embed phase is
          # platform-filtered to iOS; assert the filter actually held.
          if find "$RUNNER_TEMP/AstralDeep-macos.xcarchive" -name 'AstralWatch.app' | grep -q .; then
            echo "::error::the macOS archive embeds a watch app — the iOS platform filter regressed"
            exit 1
          fi

      - name: Export both archives for the App Store
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/AstralDeep-ios.xcarchive" \
            -exportPath "$RUNNER_TEMP/export-ios" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions-ios.plist"
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/AstralDeep-macos.xcarchive" \
            -exportPath "$RUNNER_TEMP/export-macos" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions-macos.plist"

          echo "--- export-ios ---";   ls -la "$RUNNER_TEMP/export-ios"
          echo "--- export-macos ---"; ls -la "$RUNNER_TEMP/export-macos"

          # `xcodebuild` can report EXPORT SUCCEEDED and still not emit the artifact
          # (e.g. a macOS App Store export whose installer identity never matched).
          # Assert both exist here; otherwise altool is handed an empty path, exits 0,
          # and the whole job goes green having uploaded nothing.
          IPA=$(find "$RUNNER_TEMP/export-ios"   -name '*.ipa' | head -1)
          PKG=$(find "$RUNNER_TEMP/export-macos" -name '*.pkg' | head -1)
          [ -f "$IPA" ] || { echo "::error::iOS export produced no .ipa"; exit 1; }
          [ -f "$PKG" ] || {
            echo "::error::macOS export produced no .pkg. A Mac App Store submission must be a"
            echo "::error::signed installer package. Check installerSigningCertificate in"
            echo "::error::apple-clients/ExportOptions-macos.plist against the identity actually"
            echo "::error::present in the keychain ('3rd Party Mac Developer Installer: …')."
            exit 1; }
          echo "IPA=$IPA" >> "$GITHUB_ENV"
          echo "PKG=$PKG" >> "$GITHUB_ENV"

      - name: Materialize the App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_P8_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Validate both builds
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # altool exits 0 even when it prints "VERIFY FAILED"; the wrapper refuses that.
          bash apple-clients/Scripts/altool_strict.sh "validate iOS" \
            --validate-app -f "$IPA" -t ios   --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
          bash apple-clients/Scripts/altool_strict.sh "validate macOS" \
            --validate-app -f "$PKG" -t macos --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload both builds to the single Universal Purchase record
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          bash apple-clients/Scripts/altool_strict.sh "upload iOS" \
            --upload-app -f "$IPA" -t ios   --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
          bash apple-clients/Scripts/altool_strict.sh "upload macOS" \
            --upload-app -f "$PKG" -t macos --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

      # Submitting for review requires a COMPLETE store listing (screenshots for
      # iPhone 6.9", iPad 13", Mac and Apple Watch; description; privacy policy
      # URL; age rating). Apple's own submission API refuses an incomplete
      # listing, so this step is the honest place for that gate to bite.
      # NOT automated, and deliberately not pretending to be. Submitting a
      # version requires a COMPLETE store listing (screenshots for iPhone 6.9",
      # iPad 13", Mac and Apple Watch; description; privacy-policy URL; age
      # rating) which only the operator can author, and Apple's submission API
      # refuses an incomplete listing. The builds are uploaded and validated
      # above; the operator presses Submit for Review, or this step is replaced
      # with an App Store Connect API call once the listing is finalized.
      - name: Report next step (submission is operator-performed)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "::notice::Both builds uploaded to the Universal Purchase record."
          echo "::notice::Submit the version for review in App Store Connect."

      - name: Tear down the ephemeral keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/astral-signing.keychain-db" 2>/dev/null || true
          rm -f ~/.appstoreconnect/private_keys/*.p8 2>/dev/null || true
