# Feature 053 — build, sign, upload and submit the Apple clients to the App Store.
#
# Produces TWO archives and uploads both into the SINGLE Universal Purchase App
# Store Connect record they share (bundle id com.personalailabs.astraldeep):
#   * iOS   — carries the embedded watchOS app (Embed Watch Content phase)
#   * macOS — Mac App Store (.pkg)
#
# There is deliberately NO notarytool step. Developer notarization is the
# Developer-ID / outside-the-store path. App Store builds (including Mac App
# Store) are processed and signed-checked by Apple after upload.
#
# TAG NAMESPACE: `apple-v*`, NOT `v-apple-*`. release-windows.yml triggers on
# `v*`, and a GitHub Actions `*` matches any character except `/` — so a
# `v-apple-1.0.0` tag WOULD also match `v*` and double-fire the Windows release
# (whose tag-vs-__version__ guard then fails the run). Only a namespace that does
# not begin with `v` is provably disjoint. Do not "fix" this back to `v-apple-*`.
#
# Separate from ci.yml by design: the six backend gates are untouched.

name: Release Apple clients

on:
  push:
    tags: ["apple-v*"]
  workflow_dispatch:

permissions:
  contents: read # checkout only; the App Store is the channel, not a GH Release

env:
  PROJECT: apple-clients/AstralApp/AstralApp.xcodeproj
  SCHEME: AstralApp

jobs:
  release:
    name: Archive, sign, upload and submit
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - name: Select the latest stable Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      # Fail before any signing step if the operator has not provisioned the
      # secrets. Names only ever reach the log — never values.
      - name: Require signing material
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DISTRIBUTION_CERT_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          missing=()
          for k in APPLE_TEAM_ID APPLE_DISTRIBUTION_CERT_P12_BASE64 APPLE_CERT_PASSWORD \
                   APPLE_PROVISION_PROFILE_BASE64 ASC_KEY_ID ASC_ISSUER_ID ASC_KEY_P8_BASE64; do
            [ -n "${!k}" ] || missing+=("$k")
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::missing signing material: ${missing[*]}"
            echo "No archive is produced without it. Configure these repository secrets."
            exit 1
          fi
          echo "all required secrets are present"

      # The pushed tag must be apple-v<MARKETING_VERSION>. Without this a stale
      # version constant ships under a tag that claims otherwise. Tag pushes only:
      # workflow_dispatch runs from a branch ref and has no tag to compare.
      - name: Tag matches MARKETING_VERSION
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version=$(xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
                      -configuration Release -showBuildSettings 2>/dev/null \
                    | awk '/ MARKETING_VERSION /{print $3; exit}')
          want="apple-v${version}"
          if [ "$TAG" != "$want" ]; then
            echo "::error::tag '$TAG' != '$want' — bump MARKETING_VERSION before tagging."
            exit 1
          fi
          echo "tag $TAG matches MARKETING_VERSION $version"

      - name: Import signing material into an ephemeral keychain
        env:
          APPLE_DISTRIBUTION_CERT_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/astral-signing.keychain-db"
          PASSWORD="$(uuidgen)"
          security create-keychain -p "$PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$PASSWORD" "$KEYCHAIN"

          echo "$APPLE_DISTRIBUTION_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"

          # APPLE_PROVISION_PROFILE_BASE64 is a base64 tar carrying ALL THREE App
          # Store profiles — iOS, macOS (same bundle id, different platform) and
          # watchOS — because a .mobileprovision is per bundle-id AND platform.
          # iOS/watch profiles live in MobileDevice; macOS (.provisionprofile) is
          # read from the Xcode UserData directory. Install into both, cheaply.
          IOS_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          MAC_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$RUNNER_TEMP/profiles" "$IOS_DIR" "$MAC_DIR"
          echo "$APPLE_PROVISION_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/profiles.tar"
          tar -xf "$RUNNER_TEMP/profiles.tar" -C "$RUNNER_TEMP/profiles"
          count=0
          while IFS= read -r p; do
            cp "$p" "$IOS_DIR/"; cp "$p" "$MAC_DIR/"; count=$((count + 1))
          done < <(find "$RUNNER_TEMP/profiles" \( -name '*.mobileprovision' -o -name '*.provisionprofile' \))
          rm -f "$RUNNER_TEMP/profiles.tar"
          if [ "$count" -lt 3 ]; then
            echo "::error::expected 3 provisioning profiles (iOS, macOS, watchOS), found $count"
            exit 1
          fi
          echo "imported $count profile(s)"

      # App Store Connect rejects duplicate build numbers. The CI run number is
      # monotonic and collision-free. Passed straight to xcodebuild rather than
      # rewritten into the project with agvtool: both Info.plists already read
      # $(CURRENT_PROJECT_VERSION), so nothing in the tree needs mutating.
      - name: Render export options from secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROFILE_IOS: ${{ secrets.APPLE_PROFILE_IOS }}
          APPLE_PROFILE_MACOS: ${{ secrets.APPLE_PROFILE_MACOS }}
          APPLE_PROFILE_WATCH: ${{ secrets.APPLE_PROFILE_WATCH }}
        run: |
          # `envsubst` (gettext) is not guaranteed on a macOS runner; python3 is.
          for f in ios macos; do
            python3 apple-clients/Scripts/render_export_options.py \
              "apple-clients/ExportOptions-$f.plist" "$RUNNER_TEMP/ExportOptions-$f.plist"
            plutil -lint "$RUNNER_TEMP/ExportOptions-$f.plist"
          done

      # The iOS archive carries the embedded watch app; the macOS archive must not.
      - name: Archive iOS (with the embedded watch app)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive -project "$PROJECT" -scheme "$SCHEME" \
            -destination 'generic/platform=iOS' -configuration Release \
            -archivePath "$RUNNER_TEMP/AstralDeep-ios.xcarchive" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            ASTRAL_DEVELOPMENT_TEAM="$APPLE_TEAM_ID" CODE_SIGN_STYLE=Manual
          test -d "$RUNNER_TEMP/AstralDeep-ios.xcarchive/Products/Applications/AstralDeep.app/Watch/AstralWatch.app" \
            || { echo "::error::iOS archive is missing the embedded watch app"; exit 1; }

      - name: Archive macOS (Mac App Store)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive -project "$PROJECT" -scheme "$SCHEME" \
            -destination 'generic/platform=macOS' -configuration Release \
            -archivePath "$RUNNER_TEMP/AstralDeep-macos.xcarchive" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            ASTRAL_DEVELOPMENT_TEAM="$APPLE_TEAM_ID" CODE_SIGN_STYLE=Manual
          # A macOS app must not contain a watchOS app. The embed phase is
          # platform-filtered to iOS; assert the filter actually held.
          if find "$RUNNER_TEMP/AstralDeep-macos.xcarchive" -name 'AstralWatch.app' | grep -q .; then
            echo "::error::the macOS archive embeds a watch app — the iOS platform filter regressed"
            exit 1
          fi

      - name: Export both archives for the App Store
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/AstralDeep-ios.xcarchive" \
            -exportPath "$RUNNER_TEMP/export-ios" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions-ios.plist"
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/AstralDeep-macos.xcarchive" \
            -exportPath "$RUNNER_TEMP/export-macos" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions-macos.plist"

      - name: Materialize the App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_P8_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Validate both builds
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA=$(find "$RUNNER_TEMP/export-ios" -name '*.ipa' | head -1)
          PKG=$(find "$RUNNER_TEMP/export-macos" -name '*.pkg' | head -1)
          xcrun altool --validate-app -f "$IPA" -t ios      --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
          xcrun altool --validate-app -f "$PKG" -t macos    --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload both builds to the single Universal Purchase record
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA=$(find "$RUNNER_TEMP/export-ios" -name '*.ipa' | head -1)
          PKG=$(find "$RUNNER_TEMP/export-macos" -name '*.pkg' | head -1)
          xcrun altool --upload-app -f "$IPA" -t ios   --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
          xcrun altool --upload-app -f "$PKG" -t macos --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

      # Submitting for review requires a COMPLETE store listing (screenshots for
      # iPhone 6.9", iPad 13", Mac and Apple Watch; description; privacy policy
      # URL; age rating). Apple's own submission API refuses an incomplete
      # listing, so this step is the honest place for that gate to bite.
      # NOT automated, and deliberately not pretending to be. Submitting a
      # version requires a COMPLETE store listing (screenshots for iPhone 6.9",
      # iPad 13", Mac and Apple Watch; description; privacy-policy URL; age
      # rating) which only the operator can author, and Apple's submission API
      # refuses an incomplete listing. The builds are uploaded and validated
      # above; the operator presses Submit for Review, or this step is replaced
      # with an App Store Connect API call once the listing is finalized.
      - name: Report next step (submission is operator-performed)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "::notice::Both builds uploaded to the Universal Purchase record."
          echo "::notice::Submit the version for review in App Store Connect."

      - name: Tear down the ephemeral keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/astral-signing.keychain-db" 2>/dev/null || true
          rm -f ~/.appstoreconnect/private_keys/*.p8 2>/dev/null || true
