name: android-ci

# Additive, independent of the backend Principle XI gates. Scoped to the
# android-client/ tree so backend changes don't trigger an Android build.
on:
  push:
    branches: [main]
    paths:
      - 'android-client/**'
      - 'scripts/run_android_next_major_canary.py'
      - 'backend/tests/test_android_next_major_canary.py'
      - '.github/workflows/android-ci.yml'
  pull_request:
    paths:
      - 'android-client/**'
      - 'scripts/run_android_next_major_canary.py'
      - 'backend/tests/test_android_next_major_canary.py'
      - '.github/workflows/android-ci.yml'
  schedule:
    - cron: '0 7 * * *' # nightly — runs the instrumented emulator job
  workflow_dispatch: {}

permissions:
  contents: read

defaults:
  run:
    working-directory: android-client

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'

      # Provides Gradle on PATH (the committed wrapper works locally, but
      # setup-gradle gives CI caching + provenance).
      # The version is READ FROM the committed wrapper properties — the single
      # source of truth — so CI can never drift from the repo toolchain again
      # (a hard-pinned 8.11.1 broke the AGP 9.2.1 bump: AGP 9 needs Gradle ≥9.4.1).
      - name: Resolve Gradle version from the committed wrapper
        id: wrapper
        run: |
          v=$(sed -n 's/^distributionUrl=.*gradle-\([0-9][0-9.]*\)-\(bin\|all\)\.zip$/\1/p' gradle/wrapper/gradle-wrapper.properties)
          test -n "$v" || { echo "could not parse Gradle version from wrapper properties" >&2; exit 1; }
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3
        with:
          gradle-version: ${{ steps.wrapper.outputs.version }}

      - name: Lint (ktlint + Android Lint)
        run: gradle ktlintCheck :app:lintDebug --no-daemon --stacktrace

      - name: Unit tests (:core + :app JVM)
        run: gradle :core:test :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Coverage gate (Kover ≥ 90% on :core pure logic)
        run: gradle :core:koverVerify --no-daemon --stacktrace

      - name: Publish app and core Kover XML inputs
        run: gradle :app:koverXmlReport :core:koverXmlReport --no-daemon --stacktrace

      - name: Archive app and core Kover XML inputs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-kover-xml
          path: |
            android-client/app/build/reports/kover/report.xml
            android-client/core/build/reports/kover/report.xml
          if-no-files-found: error

      - name: Assemble debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: app-debug-apk
          path: android-client/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

  next-major-canary:
    name: Android next-major compatibility (isolated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Run exact canary or verify official unavailability
        working-directory: .
        run: >-
          python3 scripts/run_android_next_major_canary.py
          android-client/gradle/next-major-canary.properties
          --allow-unreleased
          --verify-official-availability
          --output build/060/android-next-major.json

      - name: Archive next-major diagnostic
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-next-major
          path: build/060/android-next-major.json
          if-no-files-found: error

  # Instrumented Compose UI tests on an emulator. Heavier and flakier than the
  # JVM unit tests, so it is NOT a per-PR gate — it runs nightly and on demand.
  instrumented:
    name: Instrumented UI tests (emulator)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'

      # Same single-source-of-truth resolution as build-test (see above).
      - name: Resolve Gradle version from the committed wrapper
        id: wrapper
        run: |
          v=$(sed -n 's/^distributionUrl=.*gradle-\([0-9][0-9.]*\)-\(bin\|all\)\.zip$/\1/p' gradle/wrapper/gradle-wrapper.properties)
          test -n "$v" || { echo "could not parse Gradle version from wrapper properties" >&2; exit 1; }
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3
        with:
          gradle-version: ${{ steps.wrapper.outputs.version }}

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Instrumented tests (:app:connectedDebugAndroidTest)
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          working-directory: android-client
          script: gradle :app:connectedDebugAndroidTest --no-daemon --stacktrace
