name: android-ci

# Additive, independent of the backend Principle XI gates. Scoped to the
# android-client/ tree so backend changes don't trigger an Android build.
on:
  push:
    branches: [main]
    paths:
      - 'android-client/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    paths:
      - 'android-client/**'
      - '.github/workflows/android-ci.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: android-client

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Provides Gradle on PATH so we can build without committing the wrapper
      # jar (the wrapper is generated locally by Android Studio for `./gradlew`).
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Lint (ktlint + Android Lint)
        run: gradle ktlintCheck :app:lintDebug --no-daemon --stacktrace

      - name: Unit tests (:core + :app JVM)
        run: gradle :core:test :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Coverage gate (Kover ≥ 90% on :core)
        run: gradle :core:koverVerify --no-daemon --stacktrace

      - name: Assemble debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android-client/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

  # Optional follow-on: an emulator job (reactivecircus/android-emulator-runner)
  # to run the instrumented Compose UI tests (:app:connectedDebugAndroidTest).
  # Heavier and flakier than unit tests, so it runs nightly / on demand, not as a
  # per-PR gate. Added in the Polish phase (T053).
