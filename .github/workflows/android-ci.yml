name: android-ci

# Additive, independent of the backend Principle XI gates. Scoped to the
# android-client/ tree so backend changes don't trigger an Android build.
on:
  push:
    branches: [main]
    paths:
      - 'android-client/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    paths:
      - 'android-client/**'
      - '.github/workflows/android-ci.yml'
  schedule:
    - cron: '0 7 * * *' # nightly — runs the instrumented emulator job
  workflow_dispatch: {}

permissions:
  contents: read

defaults:
  run:
    working-directory: android-client

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Provides Gradle on PATH so we can build without committing the wrapper
      # jar (the wrapper is generated locally by Android Studio for `./gradlew`).
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Lint (ktlint + Android Lint)
        run: gradle ktlintCheck :app:lintDebug --no-daemon --stacktrace

      - name: Unit tests (:core + :app JVM)
        run: gradle :core:test :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Coverage gate (Kover ≥ 90% on :core pure logic)
        run: gradle :core:koverVerify --no-daemon --stacktrace

      - name: Assemble debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android-client/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

  # Instrumented Compose UI tests on an emulator. Heavier and flakier than the
  # JVM unit tests, so it is NOT a per-PR gate — it runs nightly and on demand.
  instrumented:
    name: Instrumented UI tests (emulator)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Instrumented tests (:app:connectedDebugAndroidTest)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          working-directory: android-client
          script: gradle :app:connectedDebugAndroidTest --no-daemon --stacktrace
